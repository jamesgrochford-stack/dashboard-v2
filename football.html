<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Football</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --blue: #7DD3FC;
  --purple: #B08AF0;
  --orange: #F2A063;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 760px; margin: 0 auto; }

.fb-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.dash-title {
  margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
.fb-head-date { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-tertiary); white-space: nowrap; }
.fb-head-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 20px; }
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== shared card ===== */
.card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.card-title { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; }
.card-title-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary); }
.card-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
.card-badge { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; color: var(--text-secondary); background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 999px; }

/* ===== activation card ===== */
.activation-card { border-left: 4px solid var(--success); }
.activation-card.match { border-left-color: var(--orange); background: linear-gradient(135deg, rgba(242,160,99,0.10), rgba(255,255,255,0.04)); padding: 26px; }
.activation-card.match .card-title-label { color: var(--orange); font-size: 12px; }
.activation-card.match .act-item-title { font-size: 16px; }
.act-item { display: flex; align-items: center; gap: 14px; padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
.act-item:last-child { border-bottom: none; }
.act-check { flex: none; width: 24px; height: 24px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); position: relative; transition: background 0.2s, border-color 0.2s; }
.act-check.on { background: var(--success); border-color: var(--success); }
.activation-card.match .act-check.on { background: var(--orange); border-color: var(--orange); }
.act-check.on::after { content: ''; position: absolute; left: 7px; top: 3px; width: 6px; height: 11px; border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
.act-item-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.act-item.on .act-item-title { opacity: 0.55; text-decoration: line-through; }

/* ===== session logger ===== */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); }
.fi { padding: 9px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 13.5px; outline: none; width: 100%; }
.fi:focus { border-color: rgba(255,255,255,0.3); }
.star-row { display: flex; gap: 4px; }
.star { font-size: 22px; cursor: pointer; opacity: 0.3; transition: opacity 0.1s; }
.star.lit { opacity: 1; color: var(--warning); }
.btn-primary { width: 100%; margin-top: 4px; padding: 11px; border: 0; border-radius: 12px; background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B; font-family: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer; }
.session-item { padding: 11px 13px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; }
.session-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.session-type { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.session-dur { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
.session-del { background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
.session-del:hover { color: var(--danger); }
.session-stars { color: var(--warning); font-size: 12px; letter-spacing: 1px; margin-top: 5px; }
.session-notes { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.4; }
.session-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 5px; }
.empty-note { text-align: center; padding: 14px 0; font-size: 12.5px; font-style: italic; color: var(--text-tertiary); }
.spark-wrap { margin-top: 14px; }
.spark-label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.spark-wrap svg { width: 100%; height: 50px; display: block; }

/* ===== fitness tests ===== */
.ft-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.ft-row:last-child { border-bottom: none; padding-bottom: 0; }
.ft-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ft-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
.ft-val { font-size: 20px; font-weight: 800; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.ft-update-btn { flex: none; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-secondary); border-radius: 999px; padding: 6px 13px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.ft-update-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.3); }
.ft-prev { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.ft-form { display: none; gap: 8px; margin-top: 10px; }
.ft-form.show { display: flex; }
.ft-form input[type="text"] { flex: 1; }
.ft-form input[type="date"] { flex: none; width: 130px; }

/* ===== film study ===== */
.film-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 6px; }
.film-item-main { flex: 1; min-width: 0; }
.film-item-player { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.film-item-notes { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.film-item-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); flex: none; }
.film-bars { display: flex; align-items: flex-end; gap: 10px; height: 90px; margin-top: 14px; }
.film-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 5px; }
.film-bar { width: 100%; max-width: 34px; background: var(--purple); border-radius: 5px 5px 0 0; min-height: 2px; }
.film-bar-count { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-primary); font-weight: 700; }
.film-bar-label { font-size: 9.5px; color: var(--text-tertiary); text-align: center; line-height: 1.2; }

/* ===== unified session log — match-extra fields, reuses the pmc-* classes ===== */
.pmc-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.pmc-row:last-child { border-bottom: none; }
.pmc-row-label { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
.pmc-seg { display: flex; gap: 6px; flex: none; }
.pmc-seg-btn { padding: 7px 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.28); color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
.pmc-seg-btn.active { background: var(--success); border-color: var(--success); color: #0A0A0B; }
.pmc-seg-btn.active.no { background: var(--danger); border-color: var(--danger); color: #0A0A0B; }
.pmc-seg-btn.active.na { background: var(--text-tertiary); border-color: var(--text-tertiary); color: #0A0A0B; }
.pmc-num { flex: none; width: 76px; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: var(--font-mono); font-size: 14px; text-align: center; outline: none; }
.pmc-num:focus { border-color: rgba(255,255,255,0.3); }

/* ===== editable match actions (Activation card, match day) ===== */
.matchact-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.matchact-row:last-child { border-bottom: none; }
.matchact-row input[type="text"] { flex: 1; }
.matchact-check { flex: none; width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); position: relative; cursor: pointer; }
.matchact-check.on { background: var(--orange); border-color: var(--orange); }
.matchact-check.on::after { content: ''; position: absolute; left: 6px; top: 2px; width: 6px; height: 11px; border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }

/* ===== session log: Garmin sub-row + ambiguous-match picker ===== */
.session-garmin { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }
.session-garmin.partial { color: var(--warning); }
.session-garmin-pick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.session-garmin-pick button { font-family: var(--font-mono); font-size: 10.5px; padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-secondary); cursor: pointer; }
.session-garmin-pick button:hover { border-color: rgba(255,255,255,0.3); color: var(--text-primary); }

/* ===== activation -> outcome trend ===== */
.streak-line { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 14px; }
.streak-line b { color: var(--text-primary); }
.trend-row-label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.trend-row-label svg,
.trend-wrap svg { width: 100%; height: 60px; display: block; }
.trend-legend { display: inline-flex; align-items: center; gap: 5px; text-transform: none; letter-spacing: 0; font-size: 10px; }
.trend-legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 8px; }
.trend-legend .dot:first-child { margin-left: 0; }
.trend-legend .dot.start { background: var(--success); }
.trend-legend .dot.sub { background: var(--text-tertiary); }
.trend-dates { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); margin-top: 4px; }

@media (max-width: 480px) {
  .card { padding: 16px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

  <div class="fb-head">
    <h1 class="dash-title">Football</h1>
    <div class="fb-head-date" id="headDate">—</div>
  </div>
  <div class="fb-head-sub" id="headDayType">—</div>

  <!-- ACTIVATION CARD (conditional; training days show fixed toggles, match days show editable pre-match actions) -->
  <div class="card activation-card" id="activationCard" style="display:none">
    <div class="card-title"><span class="card-title-label" id="activationLabel">3-Action Rule</span></div>
    <div id="activationRows"></div>
  </div>

  <!-- ACTIVATION -> OUTCOME TREND -->
  <div class="card">
    <div class="card-title"><span class="card-title-label">Activation &rarr; Outcome Trend</span></div>
    <div class="streak-line" id="streakLine"></div>
    <div id="trendWrap"></div>
  </div>

  <!-- UNIFIED SESSION LOG (training + matches; merges the old Session Logger and Post-Match Check) -->
  <div class="card">
    <div class="card-title"><span class="card-title-label">Session Log</span><span class="card-badge" id="sessionCountBadge">0 sessions</span></div>
    <div class="form-grid">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="sDate"></div>
      <div class="fg"><label class="fl">Type</label>
        <select class="fi" id="sType">
          <option>Club Training</option>
          <option>Individual Technical</option>
          <option>Individual Physical</option>
          <option>Film Study</option>
          <option>Match</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="fg"><label class="fl">Duration (min)</label><input class="fi" type="number" min="0" id="sDur" placeholder="60"></div>
      <div class="fg"><label class="fl">Confidence (1-5)</label><div class="star-row" id="sStars"></div></div>
    </div>
    <div class="pmc-row" style="padding:9px 2px">
      <span class="pmc-row-label">Activated early?</span>
      <span class="pmc-seg" id="sActivated">
        <button type="button" class="pmc-seg-btn" data-val="Y">Yes</button>
        <button type="button" class="pmc-seg-btn" data-val="N">No</button>
      </span>
    </div>
    <div class="form-grid" style="margin-top:10px">
      <div class="fg"><label class="fl">Went well</label><input class="fi" type="text" id="sWentWell" placeholder="One line…"></div>
      <div class="fg"><label class="fl">To fix</label><input class="fi" type="text" id="sToFix" placeholder="One line…"></div>
    </div>

    <!-- Match-only extra fields (shown when Type = Match) -->
    <div id="sMatchExtra" style="display:none;margin-top:6px">
      <div id="sMatchActionRows"></div>
      <div class="pmc-row">
        <span class="pmc-row-label">Start or Sub</span>
        <span class="pmc-seg" id="sStartSub">
          <button type="button" class="pmc-seg-btn" data-val="start">Start</button>
          <button type="button" class="pmc-seg-btn" data-val="sub">Sub</button>
        </span>
      </div>
      <div class="pmc-row">
        <span class="pmc-row-label">Minutes played</span>
        <input type="number" min="0" max="130" class="pmc-num" id="sMinutes" placeholder="—">
      </div>
    </div>

    <button type="button" class="btn-primary" id="sLogBtn" style="margin-top:12px">Log Session</button>
    <div class="spark-wrap" id="sparkWrap" style="display:none">
      <div class="spark-label">Activation Trend — confidence, last 10 sessions</div>
      <div id="sparkSvg"></div>
    </div>
    <div id="sessionList" style="margin-top:14px"></div>
  </div>

  <!-- FILM STUDY -->
  <div class="card">
    <div class="card-title"><span class="card-title-label">Film Study</span><span class="card-badge" id="filmCountBadge">0 this week</span></div>
    <div class="form-grid">
      <div class="fg"><label class="fl">Player studied</label>
        <select class="fi" id="filmPlayer">
          <option>Rodri</option><option>Declan Rice</option><option>Granit Xhaka</option><option>Ndidi</option><option>Other</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Focus question</label><input class="fi" type="text" id="filmFocus" placeholder="What are you watching for?"></div>
    </div>
    <div class="form-grid">
      <div class="fg"><label class="fl">Positive finding</label><input class="fi" type="text" id="filmPositive" placeholder="What worked…"></div>
      <div class="fg"><label class="fl">Fix identified</label><input class="fi" type="text" id="filmFix" placeholder="What to change…"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label class="fl">Drill for next session</label><input class="fi" type="text" id="filmDrill" placeholder="Concrete rep to run…"></div>
    <button type="button" class="btn-primary" id="filmLogBtn">Log Film Session</button>
    <div id="filmList" style="margin-top:14px"></div>
    <div class="film-bars" id="filmBars"></div>
  </div>

  <!-- FITNESS TESTS -->
  <div class="card">
    <div class="card-title"><span class="card-title-label">Fitness Tests</span></div>
    <div id="fitList"></div>
  </div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  function loadJSON(k, fallback) {
    try { const v = JSON.parse(localStorage.getItem(k)); return (v == null ? fallback : v); } catch (e) { return fallback; }
  }
  function saveJSON(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function pad2(n) { return String(n).padStart(2, '0'); }
  function dateKey(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function todayKey() { return dateKey(new Date()); }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
  function mondayOf(d) { const dow = (d.getDay() + 6) % 7; return addDays(d, -dow); }

  // ============================================================
  // HEADER + day type
  // ============================================================
  const DOW_MON = 1, DOW_TUE = 2, DOW_WED = 3, DOW_THU = 4, DOW_FRI = 5, DOW_SAT = 6, DOW_SUN = 0;
  function dayType(dow) {
    if (dow === DOW_MON || dow === DOW_TUE || dow === DOW_THU) return 'Training Day';
    if (dow === DOW_WED) return 'Gym Day';
    if (dow === DOW_SAT) return 'Match Day';
    return 'Rest Day';
  }
  function renderHeader() {
    const now = new Date();
    $('headDate').textContent = now.toLocaleDateString('en-IE', { weekday: 'long', month: 'short', day: 'numeric' });
    $('headDayType').textContent = dayType(now.getDay());
  }

  // ============================================================
  // ACTIVATION CARD — 3-Action Rule, Mon/Tue/Thu (training) + Sat (match)
  // ============================================================
  const ACTIVATION_ITEMS = [
    { id: 'communicate', label: 'Communicate early from minute one' },
    { id: 'demand', label: 'Demand the ball constantly' },
    { id: 'duel', label: 'Win your first duel and set the tone' },
  ];
  function activationKey() { return 'fb:activation:' + todayKey(); }
  // Match-day pre-match actions are editable per date -- specific, not generic.
  // Training days keep the fixed ACTIVATION_ITEMS list above, unchanged.
  function matchActionsKey(dateStr) { return 'fb:matchActions:' + (dateStr || todayKey()); }
  function getMatchActions(dateStr) { return loadJSON(matchActionsKey(dateStr), { texts: ['', '', ''], done: [false, false, false] }); }
  function saveMatchActions(dateStr, patch) {
    const next = Object.assign({}, getMatchActions(dateStr), patch);
    saveJSON(matchActionsKey(dateStr), next);
    return next;
  }
  function renderTrainingActivation() {
    const state = loadJSON(activationKey(), {});
    const wrap = $('activationRows');
    wrap.innerHTML = '';
    ACTIVATION_ITEMS.forEach(item => {
      const on = !!state[item.id];
      const row = document.createElement('div');
      row.className = 'act-item' + (on ? ' on' : '');
      row.innerHTML = '<span class="act-check' + (on ? ' on' : '') + '"></span><span class="act-item-title">' + esc(item.label) + '</span>';
      row.addEventListener('click', () => {
        const st = loadJSON(activationKey(), {});
        st[item.id] = !st[item.id];
        saveJSON(activationKey(), st); // instant local write; sync.js pushes to Supabase in the background
        renderTrainingActivation();
      });
      wrap.appendChild(row);
    });
  }
  function renderMatchActionsCard() {
    const data = getMatchActions(todayKey());
    const wrap = $('activationRows');
    wrap.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const row = document.createElement('div');
      row.className = 'matchact-row';
      row.innerHTML =
        '<input type="text" class="fi" data-i="' + i + '" placeholder="Action ' + (i + 1) + ' — e.g. Call for the ball from the CB in first 3 minutes" value="' + esc(data.texts[i] || '') + '">' +
        '<span class="matchact-check' + (data.done[i] ? ' on' : '') + '" data-i="' + i + '"></span>';
      wrap.appendChild(row);
    }
    wrap.querySelectorAll('input[type="text"]').forEach(input => {
      input.addEventListener('input', () => {
        const i = +input.dataset.i;
        const cur = getMatchActions(todayKey());
        cur.texts[i] = input.value;
        saveMatchActions(todayKey(), { texts: cur.texts });
        renderSessions(); // the log form/list's compliance labels follow these texts live
      });
    });
    wrap.querySelectorAll('.matchact-check').forEach(chk => {
      chk.addEventListener('click', () => {
        const i = +chk.dataset.i;
        const cur = getMatchActions(todayKey());
        cur.done[i] = !cur.done[i];
        saveMatchActions(todayKey(), { done: cur.done });
        renderMatchActionsCard();
      });
    });
  }
  function renderActivation() {
    const dow = new Date().getDay();
    const isTraining = dow === DOW_MON || dow === DOW_TUE || dow === DOW_THU;
    const isMatch = dow === DOW_SAT;
    const card = $('activationCard');
    if (!isTraining && !isMatch) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    card.classList.toggle('match', isMatch);
    $('activationLabel').textContent = isMatch ? '3-Action Rule — Match Day' : '3-Action Rule — Pre-Session';
    if (isMatch) renderMatchActionsCard(); else renderTrainingActivation();
  }

  // ============================================================
  // UNIFIED SESSION LOG — training + matches, one entry per session.
  // Merges the old Session Logger and Post-Match Check: a manual layer
  // (this section) plus a Garmin layer (auto-matched further below).
  // Match-only fields (action1/2/3, mistakeProtocol, startOrSub, minutes)
  // are composed in the same form and only saved when type === 'Match'.
  // ============================================================
  const SESSIONS_KEY = 'fb:sessions';
  function getSessions() { return loadJSON(SESSIONS_KEY, []); }
  function saveSessions(sessions) { saveJSON(SESSIONS_KEY, sessions); }
  function uid() { return 'fb' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  let sRating = 0;
  let sActivatedVal;
  let sMatchState = {}; // { action1, action2, action3, mistakeProtocol, startOrSub }
  function buildStars(container, onChange) {
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const s = document.createElement('span');
      s.className = 'star'; s.textContent = '★'; s.dataset.v = i;
      s.addEventListener('click', () => { onChange(i); paintStars(container, i); });
      container.appendChild(s);
    }
  }
  function paintStars(container, val) {
    container.querySelectorAll('.star').forEach(s => s.classList.toggle('lit', +s.dataset.v <= val));
  }
  buildStars($('sStars'), (v) => { sRating = v; });
  $('sDate').value = todayKey();

  $('sActivated').querySelectorAll('.pmc-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sActivatedVal = sActivatedVal === btn.dataset.val ? undefined : btn.dataset.val;
      $('sActivated').querySelectorAll('.pmc-seg-btn').forEach(b => b.classList.toggle('active', sActivatedVal === b.dataset.val));
    });
  });

  const MATCH_ACTION_IDS = ['action1', 'action2', 'action3'];
  function renderMatchActionRows() {
    // Labels come from that date's editable pre-match actions (goal #1),
    // not a hardcoded script -- James grades himself against what he
    // actually planned for this specific match.
    const dateStr = $('sDate').value || todayKey();
    const labels = getMatchActions(dateStr).texts;
    const rows = MATCH_ACTION_IDS.map((id, i) => ({
      id, label: labels[i] ? ('Action ' + (i + 1) + ' — ' + labels[i]) : ('Action ' + (i + 1) + ' (not set for this date)'),
      val: sMatchState[id], opts: [['Y', 'Y'], ['N', 'N']],
    })).concat([{ id: 'mistakeProtocol', label: 'Mistake protocol fired', val: sMatchState.mistakeProtocol, opts: [['Y', 'Y'], ['N', 'N'], ['NA', 'N/A']] }]);
    const wrap = $('sMatchActionRows');
    wrap.innerHTML = rows.map(r =>
      '<div class="pmc-row"><span class="pmc-row-label">' + esc(r.label) + '</span><span class="pmc-seg">' +
        r.opts.map(([val, lbl]) => {
          const active = r.val === val;
          const cls = active ? ' active' + (val === 'N' ? ' no' : val === 'NA' ? ' na' : '') : '';
          return '<button type="button" class="pmc-seg-btn' + cls + '" data-field="' + r.id + '" data-val="' + val + '">' + lbl + '</button>';
        }).join('') +
      '</span></div>'
    ).join('');
    wrap.querySelectorAll('.pmc-seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.field;
        sMatchState[field] = sMatchState[field] === btn.dataset.val ? undefined : btn.dataset.val;
        renderMatchActionRows();
      });
    });
  }
  $('sStartSub').querySelectorAll('.pmc-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sMatchState.startOrSub = sMatchState.startOrSub === btn.dataset.val ? undefined : btn.dataset.val;
      $('sStartSub').querySelectorAll('.pmc-seg-btn').forEach(b => b.classList.toggle('active', sMatchState.startOrSub === b.dataset.val));
    });
  });
  function resetMatchExtra() {
    sMatchState = {};
    renderMatchActionRows();
    $('sStartSub').querySelectorAll('.pmc-seg-btn').forEach(b => b.classList.remove('active'));
    $('sMinutes').value = '';
  }
  function syncMatchExtraVisibility() {
    const isMatchType = $('sType').value === 'Match';
    $('sMatchExtra').style.display = isMatchType ? 'block' : 'none';
    if (isMatchType) renderMatchActionRows();
  }
  $('sType').addEventListener('change', syncMatchExtraVisibility);
  $('sDate').addEventListener('change', () => { if ($('sType').value === 'Match') renderMatchActionRows(); });
  syncMatchExtraVisibility();

  $('sLogBtn').addEventListener('click', () => {
    const date = $('sDate').value || todayKey();
    const type = $('sType').value;
    const dur = parseInt($('sDur').value, 10) || 0;
    const wentWell = $('sWentWell').value.trim();
    const toFix = $('sToFix').value.trim();
    if (!dur) { alert('Enter a duration.'); return; }
    const entry = {
      id: uid(), date, type, duration: dur, confidence: sRating,
      activatedEarly: sActivatedVal, wentWell, toFix, garminActivityId: null, ts: Date.now(),
    };
    if (type === 'Match') {
      entry.action1 = sMatchState.action1;
      entry.action2 = sMatchState.action2;
      entry.action3 = sMatchState.action3;
      entry.mistakeProtocol = sMatchState.mistakeProtocol;
      entry.startOrSub = sMatchState.startOrSub;
      const rawMin = $('sMinutes').value;
      entry.minutes = rawMin === '' ? undefined : Math.max(0, Math.min(130, parseInt(rawMin, 10) || 0));
    }
    const sessions = getSessions();
    sessions.unshift(entry);
    saveSessions(sessions);
    $('sDur').value = ''; $('sWentWell').value = ''; $('sToFix').value = ''; $('sDate').value = todayKey();
    sRating = 0; paintStars($('sStars'), 0);
    sActivatedVal = undefined; $('sActivated').querySelectorAll('.pmc-seg-btn').forEach(b => b.classList.remove('active'));
    resetMatchExtra();
    renderSessions(); renderTrendChart();
  });
  function deleteSession(id) {
    const sessions = getSessions().filter(s => s.id !== id);
    saveSessions(sessions);
    renderSessions(); renderTrendChart();
  }
  function buildSparkSVG(values) {
    const W = 300, H = 50, pad = 6;
    if (values.length < 2) return '';
    const min = 1, max = 5;
    const stepX = (W - 2 * pad) / (values.length - 1);
    const pts = values.map((v, i) => ({ x: pad + i * stepX, y: H - pad - ((v - min) / (max - min)) * (H - 2 * pad) }));
    const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    const dots = pts.map((p, i) => '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3" fill="' + (values[i] >= 4 ? '#6BE3A4' : values[i] >= 3 ? '#F2C063' : '#FF6B6B') + '"></circle>').join('');
    return '<svg viewBox="0 0 ' + W + ' ' + H + '"><path d="' + line + '" fill="none" stroke="#7DD3FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' + dots + '</svg>';
  }
  function renderSessions() {
    const sessions = getSessions();
    $('sessionCountBadge').textContent = sessions.length + ' sessions';
    const withConf = sessions.filter(s => s.confidence > 0).slice(0, 10).reverse();
    const sparkWrap = $('sparkWrap');
    if (withConf.length >= 2) { sparkWrap.style.display = 'block'; $('sparkSvg').innerHTML = buildSparkSVG(withConf.map(s => s.confidence)); }
    else { sparkWrap.style.display = 'none'; }
    const list = $('sessionList');
    const recent = sessions.slice(0, 10);
    if (!recent.length) { list.innerHTML = '<div class="empty-note">No sessions logged yet.</div>'; return; }
    list.innerHTML = recent.map(s => {
      const stars = s.confidence ? '<div class="session-stars">' + '★'.repeat(s.confidence) + '☆'.repeat(5 - s.confidence) + '</div>' : '';
      const matchBits = s.type === 'Match'
        ? '<div class="session-notes">3-Action: ' + [s.action1, s.action2, s.action3].filter(v => v === 'Y').length + '/3' +
          (s.startOrSub ? ' · ' + esc(s.startOrSub) : '') + (s.minutes != null ? ' · ' + s.minutes + ' min played' : '') + '</div>'
        : '';
      return '<div class="session-item">' +
        '<div class="session-top"><span class="session-type">' + esc(s.type) + '</span>' +
        '<span style="display:flex;align-items:center;gap:10px"><span class="session-dur">' + s.duration + ' min</span>' +
        '<button type="button" class="session-del" data-id="' + s.id + '">&times;</button></span></div>' +
        (s.activatedEarly ? '<div class="session-notes">Activated early: ' + (s.activatedEarly === 'Y' ? 'Yes' : 'No') + '</div>' : '') +
        (s.wentWell ? '<div class="session-notes">Went well: ' + esc(s.wentWell) + '</div>' : '') +
        (s.toFix ? '<div class="session-notes">To fix: ' + esc(s.toFix) + '</div>' : '') +
        matchBits +
        stars +
        renderSessionGarminRow(s) +
        '<div class="session-date">' + esc(s.date) + '</div>' +
      '</div>';
    }).join('');
    list.querySelectorAll('.session-del').forEach(btn => btn.addEventListener('click', () => deleteSession(btn.dataset.id)));
    list.querySelectorAll('.garmin-pick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sessions2 = getSessions();
        const s = sessions2.find(x => x.id === btn.dataset.sessionId);
        if (s) { s.garminActivityId = +btn.dataset.activityId; saveSessions(sessions2); renderSessions(); }
      });
    });
  }

  // ============================================================
  // ONE-TIME MIGRATION — fold any pre-existing fb:postMatchCheck:{date}
  // records (from before this redesign) into fb:sessions so the season's
  // trend-chart history survives the schema change. Runs once, guarded
  // by fb:migratedPmcV1. Old fb:postMatchCheck:* keys are left in place,
  // just no longer read by anything.
  // ============================================================
  function migratePostMatchChecksOnce() {
    if (loadJSON('fb:migratedPmcV1', false)) return;
    const sessions = getSessions();
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || k.indexOf('fb:postMatchCheck:') !== 0) continue;
      const pmc = loadJSON(k, null);
      if (!pmc) continue;
      const date = k.slice('fb:postMatchCheck:'.length);
      const fields = { action1: pmc.action1, action2: pmc.action2, action3: pmc.action3, mistakeProtocol: pmc.mistakeProtocol, startOrSub: pmc.startOrSub, minutes: pmc.minutes };
      const existing = sessions.find(s => s.date === date && s.type === 'Match');
      if (existing) {
        Object.assign(existing, fields);
        if (!(existing.confidence > 0) && pmc.confidence > 0) existing.confidence = pmc.confidence;
      } else {
        sessions.push(Object.assign({ id: uid(), date, type: 'Match', duration: 0, confidence: pmc.confidence || 0, wentWell: '', toFix: '', garminActivityId: null, ts: Date.now() }, fields));
      }
    }
    sessions.sort((a, b) => b.ts - a.ts);
    saveSessions(sessions);
    saveJSON('fb:migratedPmcV1', true);
  }

  // ============================================================
  // ACTIVATION -> OUTCOME TREND — reads every unified session log entry
  // with type === 'Match' (folded in from the old per-date Post-Match
  // Check via the migration above). Rendered as small multiples (one
  // axis each, sharing the same match-date x-axis) rather than one
  // dual-axis chart, since compliance %, confidence and minutes are
  // different scales. Compliance counts a field compliant when
  // action1/2/3 = Y, or mistakeProtocol is Y or N/A (no mistake happened
  // is not a failure); an unanswered field counts as not compliant.
  // ============================================================
  function computeMatchTrend() {
    const out = getSessions().filter(s => s.type === 'Match').map(d => {
      const complianceCount =
        (d.action1 === 'Y' ? 1 : 0) +
        (d.action2 === 'Y' ? 1 : 0) +
        (d.action3 === 'Y' ? 1 : 0) +
        ((d.mistakeProtocol === 'Y' || d.mistakeProtocol === 'NA') ? 1 : 0);
      return {
        date: d.date,
        complianceCount,
        compliancePct: Math.round((complianceCount / 4) * 100),
        confidence: d.confidence || 0,
        minutes: d.minutes != null ? d.minutes : 0,
        startOrSub: d.startOrSub || null,
        executed3: d.action1 === 'Y' && d.action2 === 'Y' && d.action3 === 'Y',
      };
    });
    out.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    return out;
  }
  function updateStreakLine(matches) {
    const el = $('streakLine');
    if (!matches.length) { el.innerHTML = ''; return; }
    const last5 = matches.slice(-5);
    const executed = last5.filter(m => m.executed3).length;
    el.innerHTML = '3-Action Plan executed: <b>' + executed + ' of last ' + last5.length + '</b> match' + (last5.length === 1 ? '' : 'es');
  }
  function trendDotColor(val, good, warn) {
    if (val >= good) return '#6BE3A4';
    if (val >= warn) return '#F2C063';
    return '#FF6B6B';
  }
  function buildTrendLineSVG(values, min, max, good, warn) {
    const W = 320, H = 60, pad = 8;
    const n = values.length;
    const stepX = n > 1 ? (W - 2 * pad) / (n - 1) : 0;
    const pts = values.map((v, i) => ({
      x: pad + i * stepX,
      y: H - pad - ((Math.min(max, Math.max(min, v)) - min) / (max - min)) * (H - 2 * pad),
    }));
    const line = n > 1 ? pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ') : '';
    const dots = pts.map((p, i) => '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.5" fill="' + trendDotColor(values[i], good, warn) + '"></circle>').join('');
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none"><path d="' + line + '" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' + dots + '</svg>';
  }
  function buildTrendBarSVG(matches) {
    const W = 320, H = 60, pad = 8;
    const n = matches.length;
    const maxMin = Math.max(90, ...matches.map(m => m.minutes));
    const slot = (W - 2 * pad) / n;
    const barW = Math.max(6, slot - 5);
    const bars = matches.map((m, i) => {
      const x = pad + i * slot + (slot - barW) / 2;
      const h = Math.max(1, (m.minutes / maxMin) * (H - 2 * pad));
      const y = H - pad - h;
      const color = m.startOrSub === 'start' ? '#6BE3A4' : (m.startOrSub === 'sub' ? '#76746E' : 'rgba(255,255,255,0.15)');
      return '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + h.toFixed(1) + '" rx="2" fill="' + color + '"></rect>';
    }).join('');
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' + bars + '</svg>';
  }
  function renderTrendChart() {
    const wrap = $('trendWrap');
    const matches = computeMatchTrend();
    updateStreakLine(matches);
    if (matches.length < 3) {
      wrap.innerHTML = '<div class="empty-note">Log at least 3 matches in the Session Log to see the activation &rarr; outcome trend.</div>';
      return;
    }
    const recent = matches.slice(-10);
    const dateLabels = recent.map(m => { const p = m.date.split('-'); return p[2] + '/' + p[1]; });
    wrap.innerHTML =
      '<div class="trend-row-label">Compliance &mdash; 3 actions + mistake protocol</div>' +
      buildTrendLineSVG(recent.map(m => m.compliancePct), 0, 100, 75, 50) +
      '<div class="trend-row-label" style="margin-top:12px">Confidence</div>' +
      buildTrendLineSVG(recent.map(m => m.confidence), 0, 5, 4, 3) +
      '<div class="trend-row-label" style="margin-top:12px">Minutes played <span class="trend-legend"><span class="dot start"></span>Start<span class="dot sub"></span>Sub</span></div>' +
      buildTrendBarSVG(recent) +
      '<div class="trend-dates">' + dateLabels.map(d => '<span>' + esc(d) + '</span>').join('') + '</div>';
  }

  // ============================================================
  // FITNESS TESTS
  // ============================================================
  const FIT_TESTS = [
    { id: 'yoyo', name: 'Yo-Yo IR Level 2', unit: '', defaultVal: '21.4' },
    { id: 'illinois', name: 'Illinois Agility', unit: 's', defaultVal: '14.39' },
    { id: 'bronco', name: 'Bronco Test', unit: '', defaultVal: '4:35' },
    { id: 'sprint20', name: 'Flying 20m Sprint', unit: 's', defaultVal: '2.28' },
    { id: 'broadjump', name: 'Broad Jump', unit: 'm', defaultVal: '2.63' },
  ];
  function getFitHistory(id) { return loadJSON('fb:fitness:' + id, []); }
  function saveFitResult(id, val, date) {
    const hist = getFitHistory(id);
    hist.unshift({ val, date });
    saveJSON('fb:fitness:' + id, hist);
  }
  function renderFitTests() {
    const wrap = $('fitList');
    wrap.innerHTML = '';
    FIT_TESTS.forEach(t => {
      const hist = getFitHistory(t.id);
      const current = hist[0] || { val: t.defaultVal, date: null };

        '<div class="ft-top"><div class="ft-name">' + esc(t.name) + '</div>' +

        '<button type="button" class="ft-update-btn">Update</button></span></div>' +
        '<div class="ft-prev">' + (previous ? 'Previous: ' + esc(previous.val) + esc(t.unit) + ' · ' + esc(previous.date) : (current.date ? 'Recorded ' + esc(current.date) : 'No history yet')) + '</div>' +
        '<div class="ft-form" id="ftForm-' + t.id + '"><input type="text" class="fi" id="ftVal-' + t.id + '" placeholder="New result…">' +
        '<input type="date" class="fi" id="ftDate-' + t.id + '" value="' + todayKey() + '">' +
        '<button type="button" class="ft-update-btn" id="ftSave-' + t.id + '">Save</button></div>';
      row.querySelector('.ft-update-btn').addEventListener('click', () => {
        $('ftForm-' + t.id).classList.toggle('show');
      });
      row.querySelector('#ftSave-' + t.id).addEventListener('click', () => {
        const val = $('ftVal-' + t.id).value.trim();
        if (!val) return;
        const date = $('ftDate-' + t.id).value || todayKey();
        saveFitResult(t.id, val, date);
        renderFitTests();

      wrap.appendChild(row);

  }

  // ============================================================
  // FILM STUDY LOG — focus question set before watching, then a
  // positive finding, a fix identified, and a drill for next session:
  // closes the loop instead of a single free-text notes field.
  // ============================================================
  const FILM_KEY = 'fb:film';
  const FILM_PLAYERS = ['Rodri', 'Declan Rice', 'Granit Xhaka', 'Ndidi', 'Other'];
  function getFilm() { return loadJSON(FILM_KEY, []); }
  $('filmLogBtn').addEventListener('click', () => {
    const player = $('filmPlayer').value;
    const focusQuestion = $('filmFocus').value.trim();
    const positiveFinding = $('filmPositive').value.trim();
    const fixIdentified = $('filmFix').value.trim();
    const drillForNext = $('filmDrill').value.trim();
    const logs = getFilm();
    logs.unshift({ id: uid(), player, focusQuestion, positiveFinding, fixIdentified, drillForNext, date: todayKey(), ts: Date.now() });
    saveJSON(FILM_KEY, logs);
    $('filmFocus').value = ''; $('filmPositive').value = ''; $('filmFix').value = ''; $('filmDrill').value = '';
    renderFilm();
  });
  function deleteFilm(id) {
    saveJSON(FILM_KEY, getFilm().filter(f => f.id !== id));
    renderFilm();
  }
  function renderFilm() {
    const logs = getFilm();
    const monday = mondayOf(new Date());
    const monday0 = new Date(monday); monday0.setHours(0, 0, 0, 0);
    const thisWeek = logs.filter(l => l.ts >= monday0.getTime());
    $('filmCountBadge').textContent = thisWeek.length + ' this week';
    const list = $('filmList');
    list.innerHTML = thisWeek.length
      ? thisWeek.map(l => {
          const lines = [
            l.focusQuestion ? 'Focus: ' + esc(l.focusQuestion) : '',
            l.positiveFinding ? 'Worked: ' + esc(l.positiveFinding) : '',
            l.fixIdentified ? 'Fix: ' + esc(l.fixIdentified) : '',
            l.drillForNext ? 'Next drill: ' + esc(l.drillForNext) : '',
          ].filter(Boolean).map(t => '<div class="film-item-notes">' + t + '</div>').join('');
          return '<div class="film-item"><div class="film-item-main"><div class="film-item-player">' + esc(l.player) + '</div>' + lines + '</div><span class="film-item-date">' + esc(l.date) + '</span><button type="button" class="session-del" data-id="' + l.id + '">&times;</button></div>';
        }).join('')
      : '<div class="empty-note">No film sessions logged this week.</div>';
    list.querySelectorAll('.session-del').forEach(btn => btn.addEventListener('click', () => deleteFilm(btn.dataset.id)));
    const bars = $('filmBars');
    const max = Math.max(1, ...FILM_PLAYERS.map(p => thisWeek.filter(l => l.player === p).length));
    bars.innerHTML = FILM_PLAYERS.map(p => {
      const count = thisWeek.filter(l => l.player === p).length;
      const pct = Math.round((count / max) * 100);
      return '<div class="film-bar-col"><span class="film-bar-count">' + count + '</span><div class="film-bar" style="height:' + Math.max(2, pct) + '%"></div><span class="film-bar-label">' + esc(p) + '</span></div>';
    }).join('');
  }

  // ============================================================
  // GARMIN LAYER — auto-matched from garmin_activities (real Garmin
  // Connect data: duration, distance, avg/max HR, calories). Fetched
  // once per page load (same query shape as index.html's Training Load
  // section), then joined client-side by date + type onto each session
  // log entry. No per-activity Supabase calls.
  // ============================================================
  // No hardcoded fallback literal here (unlike index.html) -- /api/config
  // is already loaded at the top of this file and populates these on every
  // real deployment; loadGarminActivities() below just no-ops if they're
  // ever empty (e.g. opened locally with no Vercel env vars configured).
  const SUPABASE_URL = window.DASH_SUPABASE_URL || '';
  const SUPABASE_KEY = window.DASH_SUPABASE_KEY || '';
  let garminActivities = [];
  function garminDateOf(row) { return (row.start_time_local || '').slice(0, 10); }
  function garminCandidatesFor(session) {
    const date = session.date;
    if (session.type === 'Club Training' || session.type === 'Match') {
      return garminActivities.filter(a => garminDateOf(a) === date && a.activity_type === 'soccer');
    }
    if (session.type === 'Individual Physical') {
      return garminActivities.filter(a => garminDateOf(a) === date);
    }
    return []; // Individual Technical / Film Study never have a matching physical Garmin activity
  }
  function isPartialGarmin(a) {
    // Manual match entries: no watch worn during play -- 0 calories/distance, null HR.
    return !a.calories && !a.distance_meters && a.average_hr == null;
  }
  function garminSummary(a) {
    const bits = [];
    if (a.duration_seconds) bits.push(Math.round(a.duration_seconds / 60) + ' min');
    if (a.distance_meters) bits.push((a.distance_meters / 1000).toFixed(1) + ' km');
    if (a.average_hr != null) bits.push('avg ' + Math.round(a.average_hr) + (a.max_hr != null ? ' / max ' + Math.round(a.max_hr) : '') + ' bpm');
    return bits.join(' · ');
  }
  function renderSessionGarminRow(s) {
    if (s.garminActivityId) {
      const a = garminActivities.find(x => x.activity_id === s.garminActivityId);
      if (a) return '<div class="session-garmin' + (isPartialGarmin(a) ? ' partial' : '') + '">Garmin: ' + (garminSummary(a) || 'manual entry, no HR data') + '</div>';
    }
    const candidates = garminCandidatesFor(s);
    if (!candidates.length) {
      if (s.type === 'Individual Technical' || s.type === 'Film Study') return '';
      return '<div class="session-garmin">No Garmin data for this date</div>';
    }
    if (candidates.length === 1) {
      const a = candidates[0];
      return '<div class="session-garmin' + (isPartialGarmin(a) ? ' partial' : '') + '">Garmin: ' + (garminSummary(a) || 'manual entry, no HR data') + '</div>';
    }
    // Same-day multiple candidates (e.g. training + match both logged) -- ask once, then remember.
    return '<div class="session-garmin">Multiple Garmin sessions this date — which one?' +
      '<div class="session-garmin-pick">' + candidates.map(a =>
        '<button type="button" class="garmin-pick-btn" data-session-id="' + s.id + '" data-activity-id="' + a.activity_id + '">' +
          esc((a.start_time_local || '').slice(11, 16)) + ' · ' + esc(garminSummary(a) || 'no HR data') +
        '</button>'
      ).join('') + '</div></div>';
  }
  async function loadGarminActivities() {
    try {
      if (!window.supabase || !SUPABASE_URL) {
        console.warn('[Garmin layer] Supabase not configured -- skipping.');
        return;
      }
      const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const { data, error } = await supa
        .from('garmin_activities')
        .select('activity_id,activity_type,start_time_local,duration_seconds,distance_meters,average_hr,max_hr,calories')
        .order('start_time_local', { ascending: false })
        .limit(60);
      if (error) throw error;
      garminActivities = data || [];
      renderSessions();
    } catch (e) {
      // Garmin layer is a nice-to-have enrichment; the manual log stands on its own if this fails.
    }
  }

  // ---------- boot ----------
  function renderAll() {
    renderHeader();
    renderActivation();
    renderSessions();
    renderTrendChart();
    renderFitTests();
    renderFilm();
  }
  migratePostMatchChecksOnce();
  renderAll();
  loadGarminActivities();
  setInterval(renderAll, 60 * 1000); // catches midnight rollover for activation
  window.addEventListener('storage', renderAll);
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'footballPage',
    syncedPrefixes: ['fb:'],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
