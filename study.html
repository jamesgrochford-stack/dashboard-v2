<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Study</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 760px; margin: 0 auto; }

/* ===== header ===== */
.study-head-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 20px; }

/* ===== shared card ===== */
.card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.card-title { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; }
.card-title-label { font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary); }
.card-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }
.week-badge { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-primary); background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 999px; }

/* ===== day navigator ===== */
.day-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
.day-nav-btn { flex: none; width: 34px; height: 34px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text-secondary); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
.day-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.09); color: var(--text-primary); }
.day-nav-btn:disabled { opacity: 0.3; cursor: default; }
.day-nav-label { font-size: 15px; font-weight: 700; color: var(--text-primary); text-align: center; }
.day-nav-sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); text-align: center; margin-top: 2px; }

.study-empty { text-align: center; padding: 20px 0; font-size: 13px; font-style: italic; color: var(--text-tertiary); }

/* ===== study session card ===== */
.study-session {
  padding: 14px 16px; margin-bottom: 10px;
  border-radius: 12px; background: rgba(255,255,255,0.03); border-left: 4px solid var(--text-tertiary);
  transition: opacity 0.2s, background 0.2s;
}
.study-session.done { opacity: 0.5; background: rgba(107,227,164,0.04); }
.study-session.missed { border-left-color: var(--danger); }
.study-session.upcoming { opacity: 0.4; }
.study-missed-label { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--danger); text-transform: uppercase; align-self: center; margin-right: auto; }
.study-upcoming-label { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--text-tertiary); text-transform: uppercase; margin-top: 8px; }
.study-session-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.study-subject { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.study-badge { display: inline-block; font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--text-secondary); margin-left: 8px; }
.study-dur { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); flex: none; white-space: nowrap; }
.study-detail { font-size: 12.5px; color: var(--text-tertiary); margin-top: 6px; line-height: 1.5; cursor: pointer; }
.study-detail.collapsed { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.study-actions { display: flex; gap: 8px; margin-top: 10px; }
.study-btn { flex: none; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-secondary); border-radius: 999px; padding: 6px 13px; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; font-family: inherit; }
.study-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text-primary); }
.study-btn.done-btn.is-active { background: rgba(107,227,164,0.16); border-color: rgba(107,227,164,0.4); color: var(--success); }
.study-btn.undo-btn { color: var(--text-tertiary); }

/* ===== weekly completion grid ===== */
.week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.week-grid-col { text-align: center; padding: 10px 4px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; }
.week-grid-col.is-today { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); }
.week-grid-day { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
.week-grid-dots { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.week-grid-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-tertiary); opacity: 0.4; }
.week-grid-dot.done { background: var(--success); opacity: 1; box-shadow: 0 0 6px rgba(107,227,164,0.5); }
.week-grid-dot.missed { background: var(--danger); opacity: 0.85; }
.week-grid-empty { font-size: 10px; color: var(--text-tertiary); }
.week-grid-dot-single { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--text-tertiary); opacity: 0.3; }
.week-grid-dot-single.done { background: var(--success); opacity: 1; box-shadow: 0 0 6px rgba(107,227,164,0.5); }
.week-grid-dot-single.partial { background: var(--warning); opacity: 1; }
.week-grid-dot-single.missed { background: var(--danger); opacity: 0.85; }
.week-grid-dot-single.upcoming { opacity: 0.3; }
.week-grid-dot-single.none { opacity: 0.15; }

/* ===== week toggle (navigate weeks 1-10; reuses .day-nav* layout) ===== */
.week-toggle-status { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-tertiary); text-transform: uppercase; }
.week-toggle-status.is-past { color: var(--danger); }
.week-toggle-status.is-upcoming { color: var(--text-tertiary); }
.week-toggle-status.is-current { color: var(--success); }

/* ===== irish floating sessions ===== */
.irish-row { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.irish-row:last-child { border-bottom: none; }
.irish-row.locked { opacity: 0.4; }
.irish-main { flex: 1; min-width: 0; }
.irish-title { font-size: 13.5px; font-weight: 700; color: var(--text-primary); }
.irish-detail { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.irish-lock { font-size: 11px; color: var(--warning); margin-top: 3px; }
.irish-dur { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); flex: none; }
.irish-actions { display: flex; gap: 6px; flex: none; }

/* ===== applied maths counter ===== */
.am-headline { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 16px; }
.am-step-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: var(--text-primary); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.am-step-btn:hover { background: rgba(255,255,255,0.09); }
.am-count { font-size: 42px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.am-count span { font-size: 16px; color: var(--text-tertiary); font-weight: 500; }
.am-chapters { display: flex; flex-direction: column; gap: 6px; }
.am-chapter-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); font-size: 12.5px; color: var(--text-secondary); }
.am-chapter-row.current { background: rgba(200,240,96,0.10); border: 1px solid rgba(200,240,96,0.3); color: var(--text-primary); font-weight: 700; }
.am-chapter-row.complete { opacity: 0.5; }
.am-chapter-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }

/* ===== points estimator ===== */
.pts-toggle { width: 100%; padding: 12px; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.16); background: transparent; color: var(--text-secondary); font-family: inherit; font-size: 12.5px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
.pts-toggle:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.3); }
.pts-body { display: none; margin-top: 16px; }
.pts-body.show { display: block; }
.pts-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.pts-row:last-of-type { border-bottom: none; }
.pts-row-name { font-size: 13.5px; color: var(--text-primary); font-weight: 600; }
.pts-row select { padding: 7px 10px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 13px; }
.pts-summary { margin-top: 16px; padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.pts-total { font-size: 26px; font-weight: 800; color: var(--text-primary); }
.pts-total span { font-size: 14px; color: var(--text-tertiary); font-weight: 500; }
.pts-gap { font-family: var(--font-mono); font-size: 15px; font-weight: 800; color: var(--warning); text-align: right; }
.pts-gap.met { color: var(--success); }
.pts-section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin: 18px 0 10px; }
.pts-locked-row { display: flex; flex-wrap: wrap; gap: 8px; }
.pts-locked-item { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 999px; background: rgba(107,227,164,0.08); font-size: 11px; }
.pts-locked-check { color: var(--success); font-size: 11px; }
.pts-locked-name { color: var(--text-secondary); font-weight: 600; }
.pts-locked-grade { font-family: var(--font-mono); color: var(--success); font-weight: 700; }
.pts-marg-row { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.03); margin-bottom: 10px; border-left: 3px solid var(--warning); }
.pts-marg-row:last-child { margin-bottom: 0; }
.pts-marg-row.deprioritised { border-left-color: var(--text-tertiary); opacity: 0.6; background: rgba(255,255,255,0.02); }
.pts-marg-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.pts-marg-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.pts-marg-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; flex: none; }
.pts-marg-badge.counting { background: rgba(107,227,164,0.15); color: var(--success); }
.pts-marg-badge.bench { background: rgba(255,255,255,0.08); color: var(--text-tertiary); }
.pts-marg-tag { font-size: 11.5px; color: var(--text-tertiary); font-style: italic; margin-bottom: 10px; }
.pts-marg-grades { display: flex; align-items: center; gap: 10px; }
.pts-marg-g { display: flex; flex-direction: column; gap: 3px; }
.pts-marg-g label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); }
.pts-marg-g select { padding: 6px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 12.5px; }
.pts-marg-pts { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 2px; display: block; }
.pts-marg-arrow { color: var(--text-tertiary); font-size: 14px; margin-top: 14px; }
.pts-marg-ontable { margin-top: 10px; font-family: var(--font-mono); font-size: 12.5px; font-weight: 700; color: var(--warning); }
.pts-marg-note { margin-top: 10px; font-size: 11.5px; color: var(--text-tertiary); font-style: italic; }

/* ===== subject OS ===== */
.subj-card { border-radius: 12px; background: rgba(255,255,255,0.03); margin-bottom: 8px; overflow: hidden; }
.subj-head { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; }
.subj-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.subj-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--text-primary); }
.subj-grade { font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.subj-caret { font-size: 12px; color: var(--text-tertiary); transition: transform 0.2s; flex: none; }
.subj-card.open .subj-caret { transform: rotate(90deg); }
.subj-body { display: none; padding: 0 14px 16px; }
.subj-card.open .subj-body { display: block; }
.subj-rag { display: flex; gap: 8px; margin-bottom: 14px; }
.subj-rag button { flex: 1; padding: 8px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); color: var(--text-secondary); font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; }
.subj-rag button.rag-red.active { background: rgba(255,107,107,0.18); border-color: var(--danger); color: var(--danger); }
.subj-rag button.rag-amber.active { background: rgba(242,192,99,0.18); border-color: var(--warning); color: var(--warning); }
.subj-rag button.rag-green.active { background: rgba(107,227,164,0.18); border-color: var(--success); color: var(--success); }
.topic-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.topic-row:last-of-type { border-bottom: none; }
.topic-name { flex: 1; font-size: 12.5px; color: var(--text-secondary); }
.topic-srs { flex: none; font-family: var(--font-mono); font-size: 10px; padding: 4px 9px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); color: var(--text-tertiary); cursor: pointer; white-space: nowrap; }
.topic-srs.new { color: var(--text-tertiary); }
.topic-srs.due { color: var(--warning); border-color: rgba(242,192,99,0.35); }
.topic-srs.overdue { color: var(--danger); border-color: rgba(255,107,107,0.35); }
.topic-srs.ahead { color: var(--success); border-color: rgba(107,227,164,0.35); }
.topic-add { display: flex; gap: 8px; margin-top: 10px; }
.topic-add input { flex: 1; padding: 8px 11px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 12.5px; outline: none; }
.topic-add button { padding: 8px 14px; border-radius: 9px; border: 0; background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }

/* ===== AAC project tracker (summer checklist + 6th-year deadlines) ===== */
.aacp-sub-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin: 4px 0 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.aacp-progress-badge { font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.aacp-progress-badge.full { background: rgba(107,227,164,0.15); color: var(--success); }
.aacp-check-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
.aacp-check-row:last-child { border-bottom: none; }
.aacp-check { flex: none; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28); position: relative; transition: background 0.2s, border-color 0.2s; }
.aacp-check.on { background: var(--success); border-color: var(--success); }
.aacp-check.on::after { content: ''; position: absolute; left: 5px; top: 1px; width: 6px; height: 11px; border: solid #0A0A0B; border-width: 0 2px 2px 0; transform: rotate(45deg); }
.aacp-check-label { font-size: 13px; color: var(--text-secondary); }
.aacp-check-row.done .aacp-check-label { color: var(--text-tertiary); text-decoration: line-through; }
.aacp-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0 14px; }
.aacp-phase-row { padding: 11px 2px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.aacp-phase-row:last-child { border-bottom: none; }
.aacp-phase-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.aacp-phase-label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.aacp-pace-badge { font-family: var(--font-mono); font-size: 9.5px; font-weight: 700; padding: 3px 8px; border-radius: 999px; flex: none; white-space: nowrap; }
.aacp-pace-badge.ok { background: rgba(107,227,164,0.12); color: var(--success); }
.aacp-pace-badge.behind { background: rgba(255,107,107,0.15); color: var(--danger); }
.aacp-pace-badge.done { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.aacp-status-seg { display: flex; gap: 6px; }
.aacp-status-btn { flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.28); color: var(--text-secondary); font-family: inherit; font-size: 10.5px; font-weight: 700; cursor: pointer; text-align: center; }
.aacp-status-btn.active { background: var(--success); border-color: var(--success); color: #0A0A0B; }
.aacp-status-btn.active.progress { background: var(--warning); border-color: var(--warning); }
.aacp-deadline-row { padding-top: 12px; }
.aacp-deadline-placeholder { font-size: 12.5px; color: var(--warning); cursor: pointer; padding: 10px 12px; border-radius: 10px; border: 1px dashed rgba(242,192,99,0.4); background: rgba(242,192,99,0.06); }
.aacp-deadline-countdown { font-size: 12.5px; color: var(--text-secondary); cursor: pointer; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.04); line-height: 1.5; }
.aacp-deadline-countdown b { font-size: 18px; color: var(--success); display: block; }
.aacp-deadline-edit { display: none; gap: 8px; margin-top: 8px; }
.aacp-deadline-edit.show { display: flex; }
.aacp-deadline-edit input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.28); color: var(--text-primary); font-family: inherit; font-size: 13px; }
.aacp-deadline-edit button { padding: 8px 14px; border-radius: 8px; border: 0; background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }

/* ===== streaks ===== */
.streaks-row { display: flex; gap: 10px; }
.streak-item { flex: 1; text-align: center; padding: 12px 6px; border-radius: 12px; background: rgba(255,255,255,0.03); }
.streak-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }

  function getDeletedIds() { return loadJSON('completionLogDeletedIds', []); }
  function tombstone(ids) {

  function unionById(a, b) {

      if (!e || !e.id || seen.has(e.id)) return;
      seen.add(e.id);
      out.push(e);
    });
    return out;
  }
  function mergeCompletionLog(localVal, remoteVal) {
    const deleted = new Set(getDeletedIds());
    return unionById(localVal, remoteVal).filter(e => !deleted.has(e.id));

  // ---------- one-time migration from the old per-page sd:/td:studyDone
  // maps + the old manual sd:amCounter, guarded so it only ever runs once.
  // Where both sd: and td: have an entry for the same date+index and they
  // disagree, OR wins (true beats false) -- losing a real completed
  // session is worse than one stale re-click. ----------
  function migrateStudyDoneOnce() {
    if (loadJSON('completionLogMigratedV1', false)) return;
    const log = getCompletionLog();
    const seen = new Set(log.map(e => e.scheduledDate + '|' + e.subject + '|' + e.type + '|' + e.detail));
    const DAY_NAMES = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

    function importPrefix(prefix) {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || k.indexOf(prefix) !== 0) continue;
        const dStr = k.slice(prefix.length);
        const doneMap = loadJSON(k, null);
        if (!doneMap) continue;
        const d = new Date(dStr + 'T00:00:00');
        const week = Math.floor((startOfDay(d) - SUMMER_START) / 86400000 / 7) + 1;
        const day = DAY_NAMES[d.getDay()];
        Object.keys(doneMap).forEach(idxStr => {
          if (!doneMap[idxStr]) return;
          const session = findSchedSession(week, day, parseInt(idxStr, 10));
          if (!session) return;
          const key = dStr + '|' + session.subject + '|' + session.type + '|' + session.detail;
          if (seen.has(key)) return;
          seen.add(key);
          log.push({ id: clUid(), date: dStr, week, day, subject: session.subject, type: session.type, detail: session.detail, scheduledDate: dStr });
        });
      }
    }
    importPrefix('sd:studyDone:');
    importPrefix('td:studyDone:');

    // Seed Applied Maths progress from the old manual counter so switching
    // to a derived count doesn't make real logged progress vanish.
    const oldAmCount = loadJSON('sd:amCounter', 0);
    let amAlreadyLogged = log.filter(e => e.subject === 'Applied Maths').length;
    if (oldAmCount > amAlreadyLogged) {
      const amSessions = [];
      for (let w = 1; w <= 10; w++) {
        ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(day => {
          (schedule[w][day] || []).forEach(s => { if (s.subject === 'Applied Maths') amSessions.push({ week: w, day, s }); });
        });
      }
      let need = oldAmCount - amAlreadyLogged;
      for (const { week, day, s } of amSessions) {
        if (need <= 0) break;
        const dStr = dateKey(addDays(weekMonday(week), DAY_NAMES.indexOf(day) - 1));
        const key = dStr + '|' + s.subject + '|' + s.type + '|' + s.detail;
        if (seen.has(key)) continue;
        seen.add(key);
        log.push({ id: clUid(), date: dStr, week, day, subject: s.subject, type: s.type, detail: s.detail, scheduledDate: dStr });
        need--;
      }
    }

    saveCompletionLog(log);
    saveJSON('completionLogMigratedV1', true);
  }

    if (map[type]) return map[type];

  function computeAmProgress() {
    const amEntries = getCompletionLog().filter(e => e.subject === 'Applied Maths');
    const realEntries = amEntries.filter(e => e.type !== 'Manual');
    let manualLeft = amEntries.length - realEntries.length;
    const perChapterReal = {};
    realEntries.forEach(e => {
      const ch = chapterForEntry(e);
      if (ch) perChapterReal[ch] = (perChapterReal[ch] || 0) + 1;

    const chapterCounts = {};
    AM_CHAPTERS.forEach(ch => {
      const real = Math.min(ch.lessons, perChapterReal[ch.key] || 0);

      if (manualLeft > 0 && real < ch.lessons) {
        extra = Math.min(manualLeft, ch.lessons - real);
        manualLeft -= extra;

      chapterCounts[ch.key] = real + extra;
    });
    return { total: amEntries.length, chapterCounts };

      const opts = Object.keys(GRADE_POINTS).map(g => '<option value="' + g + '"' + (grades[s.id] === g ? ' selected' : '') + '>' + g + '</option>').join('');
      row.innerHTML = '<span class="pts-row-name">' + esc(s.name) + '</span><select>' + opts + '</select>';
      row.querySelector('select').addEventListener('change', (e) => {
        const g = getGrades(); g[s.id] = e.target.value; saveJSON('sd:points', g);
        renderPointsSummary(); renderLocked(); renderMarginal();
      });
      wrap.appendChild(row);
    });
    renderPointsSummary();
    renderLocked();
    renderMarginal();
  }
  function renderPointsSummary() {
    const total = computePoints();
    $('ptsTotal').textContent = total;
    const gap = 625 - total;
    const gapEl = $('ptsGap');
    if (gap <= 0) { gapEl.textContent = '625 reached — +' + (-gap) + ' over'; gapEl.classList.add('met'); }
    else { gapEl.textContent = gap + ' points short of 625'; gapEl.classList.remove('met'); }
  }
  function renderLocked() {
    const grades = getGrades();
    $('ptsLockedRow').innerHTML = LOCKED_SUBJECTS.map(id => {
      const subj = SUBJECTS.find(s => s.id === id);
      const grade = grades[id] || 'H8';
      return '<div class="pts-locked-item"><span class="pts-locked-check">&check;</span><span class="pts-locked-name">' + esc(subj.name) + '</span><span class="pts-locked-grade">' + esc(grade) + '</span></div>';
    }).join('');
  }
  function renderMarginal() {
    const grades = getGrades();
    const targets = getTargets();
    const countingIds = computeCountingIds();
    const marginalIds = ['chemistry', 'accounting', 'appliedMaths', 'french', 'english'];
    const gradeOpts = Object.keys(GRADE_POINTS);
    const rows = marginalIds.map(id => {
      const subj = SUBJECTS.find(s => s.id === id);
      const curGrade = grades[id] || 'H8';
      const tgtGrade = targets[id] || curGrade;
      const curPts = GRADE_POINTS[curGrade] || 0;
      const tgtPts = GRADE_POINTS[tgtGrade] || 0;
      return { id, name: subj.name, curGrade, tgtGrade, curPts, tgtPts, onTable: Math.max(0, tgtPts - curPts), tag: GAP_TAGS[id] };
    });
    const english = rows.find(r => r.id === 'english');
    const rest = rows.filter(r => r.id !== 'english').sort((a, b) => b.onTable - a.onTable);
    function rowHtml(r) {
      const counting = countingIds.indexOf(r.id) !== -1;
      const deprioritized = DEPRIORITIZED_NOTE[r.id];
      const optsHtml = (selected) => gradeOpts.map(g => '<option value="' + g + '"' + (g === selected ? ' selected' : '') + '>' + g + '</option>').join('');
      return '<div class="pts-marg-row' + (deprioritized ? ' deprioritised' : '') + '">' +
        '<div class="pts-marg-top"><span class="pts-marg-name">' + esc(r.name) + '</span>' +
        '<span class="pts-marg-badge ' + (counting ? 'counting' : 'bench') + '">' + (counting ? 'Counting' : 'Bench') + '</span></div>' +
        '<div class="pts-marg-tag">' + esc(r.tag) + '</div>' +
        '<div class="pts-marg-grades">' +
          '<div class="pts-marg-g"><label>Current</label><select data-role="current" data-id="' + r.id + '">' + optsHtml(r.curGrade) + '</select><span class="pts-marg-pts">' + r.curPts + ' pts</span></div>' +
          '<div class="pts-marg-arrow">&rarr;</div>' +
          '<div class="pts-marg-g"><label>Target</label><select data-role="target" data-id="' + r.id + '">' + optsHtml(r.tgtGrade) + '</select><span class="pts-marg-pts">' + r.tgtPts + ' pts</span></div>' +
        '</div>' +
        (deprioritized
          ? '<div class="pts-marg-note">' + esc(deprioritized(r)) + '</div>'
          : '<div class="pts-marg-ontable">+' + r.onTable + ' points on the table</div>') +
      '</div>';
    }
    $('ptsMarginal').innerHTML = rest.map(rowHtml).join('') + (english ? rowHtml(english) : '');
    $('ptsMarginal').querySelectorAll('select[data-role="current"]').forEach(sel => {
      sel.addEventListener('change', (e) => {
        const g = getGrades(); g[sel.dataset.id] = e.target.value; saveJSON('sd:points', g);
        renderPointsSummary(); renderLocked(); renderMarginal(); renderPointsRows();
      });
    });
    $('ptsMarginal').querySelectorAll('select[data-role="target"]').forEach(sel => {
      sel.addEventListener('change', (e) => { saveTarget(sel.dataset.id, e.target.value); renderMarginal(); });
    });
  }
  $('ptsToggle').addEventListener('click', () => {
    const showing = $('ptsBody').classList.toggle('show');
    $('ptsToggle').textContent = showing ? 'Tap to collapse' : 'Tap to expand';
  });

  // ============================================================
  // STREAKS
  // ============================================================
  // Study Days is auto-calculated from completionLog (consecutive days with
  // at least one non-Anki entry) -- no manual tap needed. Duolingo/Anki stay
  // manual since those happen outside the dashboard.
  const STREAKS = [
    { id: 'duolingo', label: 'Duolingo', manual: true },
    { id: 'anki', label: 'Anki', manual: true },
    { id: 'studyDays', label: 'Study Days', manual: false },
  ];
  function getStreaks() { return loadJSON('sd:streaks', {}); }
  function computeStudyDaysStreak() {
    const log = getCompletionLog();
    let streak = 0;
    let d = startOfDay(new Date());
    while (log.some(e => e.date === dateKey(d) && e.subject !== 'Anki')) {
      streak++;
      d = addDays(d, -1);
    }
    return streak;
  }
  function renderStreaks() {
    const state = getStreaks();
    const wrap = $('streaksRow');
    wrap.innerHTML = '';
    STREAKS.forEach(s => {
      const val = s.manual ? (state[s.id] || 0) : computeStudyDaysStreak();
      const item = document.createElement('div');
      item.className = 'streak-item';
      item.innerHTML =
        '<div class="streak-label">' + esc(s.label) + '</div>' +
        '<div class="streak-val">' + val + '</div>' +
        (s.manual
          ? '<div class="streak-btns"><button type="button" data-d="-1">&minus;</button><button type="button" data-d="1">+</button></div>'
          : '<div class="streak-label" style="opacity:.5;margin-top:8px">auto</div>');
      if (s.manual) {
        item.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => {
            const st = getStreaks();
            st[s.id] = Math.max(0, (st[s.id] || 0) + parseInt(btn.dataset.d, 10));
            saveJSON('sd:streaks', st);
            renderStreaks();
          });
        });
      }
      wrap.appendChild(item);
    });
  }

  // ---------- boot ----------
  function renderAll() {
    renderHeader();
    renderWeekToggle();
    renderStudyPanel();
    renderWeekGrid();
    renderIrish();
    renderAM();
    renderPointsRows();
    renderStreaks();
  }
  renderAll();
  // Short delay so the completionLog cloud pull (async, see bottom of file)
  // has a chance to resolve before migration runs against local state --
  // reduces (doesn't fully eliminate) the odds of two devices independently
  // migrating the same old sd:/td:studyDone data before syncing with each other.
  setTimeout(() => { migrateStudyDoneOnce(); renderAll(); }, 1500);
  setInterval(renderHeader, 60 * 1000);
  window.addEventListener('storage', renderAll);
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'studyPage',
    syncedPrefixes: ['sd:'],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
  // Dedicated registration for the shared completionLog key -- deliberately
  // NOT under the sd: prefix. It's read/written from both study.html and
  // index.html, so it needs its own Supabase row (key='completionLog') that
  // both pages' sync instances independently push/pull, rather than living
  // inside either page's own sd:/td: blob where only one side would ever
  // push it.
  initCloudSync({
    appKey: 'completionLog',
    syncedKeys: ['completionLog', 'completionLogMigratedV1', 'completionLogDeletedIds'],
    merge: {
      completionLog: mergeCompletionLog,
      completionLogDeletedIds: mergeDeletedIds,
    },
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
</body>
</html>
