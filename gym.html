<!DOCTYPE html>
<html lang="en">
<head>
<script src="/api/config"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050b08">
<title>Workout logger</title>
<script src="topbar.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --fg:#fff;
    --mint:#6EE7B7; --mint-cool:#A7F3D0; --mint-hover:#5dd6a6; --amber:#F59E0B; --rose:#e0767b; --gold:#f1cf7a;
    --muted:rgba(255,255,255,.5); --muted-strong:rgba(255,255,255,.72);
    --rule:rgba(255,255,255,.08); --rule-strong:rgba(255,255,255,.16);
    --card:rgba(255,255,255,.022);
    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.16,1,.3,1); --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::selection{background:rgba(110,231,183,.25);color:#fff}
  html,body{background:var(--bg);min-height:100%}
  body{font-family:var(--sans);color:var(--fg);-webkit-font-smoothing:antialiased;letter-spacing:-.006em;
    padding:34px 18px 90px;display:flex;justify-content:center;overflow-x:hidden}

  /* ── background: light at the top, gradient down to pure black, snowy particles ── */
  .atmos{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 40% at 50% -4%, rgba(110,231,183,.16), transparent 60%),
      linear-gradient(180deg, #07140e 0%, #050b08 32%, #020403 64%, #000 100%);}
  #snow{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.9}

  .wrap{position:relative;z-index:1;width:100%;max-width:620px}
  .num,.pillValue,.pillInput{font-variant-numeric:tabular-nums}

  /* ── progress rail ── */
  .top{display:flex;align-items:center;gap:14px;margin-bottom:30px}
  .track{flex:1;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--mint);border-radius:2px;transition:width .5s var(--ease)}
  .count{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted);white-space:nowrap}
  .count b{color:var(--mint-cool);font-style:normal;font-weight:500;font-variant-numeric:tabular-nums}

  /* ── day switch (Wednesday / Sunday) ── */
  .sessionLabel{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted-strong);margin-bottom:10px}
  .daySeg{display:flex;gap:8px;margin-bottom:22px}
  .dayPill{flex:1;text-align:center;padding:11px 14px;border-radius:14px;border:1px solid var(--rule-strong);
    background:var(--card);color:var(--muted-strong);font-family:var(--serif);font-style:italic;font-size:16px;
    cursor:pointer;transition:background .2s var(--ease),border-color .2s var(--ease),color .2s var(--ease)}
  .dayPill:hover{border-color:rgba(110,231,183,.4)}
  .dayPill.active{background:var(--mint);border-color:var(--mint);color:#04140d;font-weight:600;font-style:normal}

  /* ── lift card ── */
  .lift{margin-bottom:30px;opacity:0;transform:translateY(10px);animation:rise .6s var(--ease) forwards}
  .lift.dragging{opacity:.55}
  @keyframes rise{to{opacity:1;transform:none}}
  .lift-head{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--rule);padding-bottom:11px}
  .glyph{flex:none;width:20px;height:20px;color:var(--mint);opacity:.8;display:grid;place-items:center;cursor:grab;touch-action:none}
  .lift.dragging .glyph{cursor:grabbing}
  .glyph svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .lift-name{font-family:var(--serif);font-size:28px;line-height:1;letter-spacing:-.01em;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .info{flex:none;width:18px;height:18px;border:1px solid rgba(110,231,183,.4);color:var(--mint);border-radius:50%;
    font-family:var(--serif);font-style:italic;font-size:11px;display:grid;place-items:center;cursor:pointer;opacity:.8;transition:opacity .2s,background .2s}
  .info:hover{opacity:1;background:rgba(110,231,183,.08)}
  .lift-head .sp{flex:1}
  .lift-x{flex:none;background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;border-radius:8px;opacity:.5;transition:color .2s,opacity .2s,background .2s}
  .lift-x:hover{color:var(--rose);opacity:1;background:rgba(224,118,123,.08)}
  .lift-x svg{width:17px;height:17px;display:block;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round}

  .lift-meta{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 14px}
  .tierchip{border:1px solid var(--rule-strong);border-radius:6px;padding:4px 8px;letter-spacing:.14em;color:var(--muted-strong)}

  /* ── per-lift action chips ── */
  .chips{display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(110,231,183,.26);border-radius:999px;
    background:rgba(110,231,183,.03);color:var(--mint);font-family:var(--serif);font-style:italic;font-size:15px;
    padding:8px 15px;cursor:pointer;box-shadow:0 0 14px rgba(110,231,183,.06);transition:border-color .2s,background .2s,transform .15s var(--spring)}
  .chip:hover{border-color:rgba(110,231,183,.5);background:rgba(110,231,183,.07)} .chip:active{transform:scale(.95)}
  .chip svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  /* ── progressive-overload ★ pill (·· ★ at the end of the chips row) — 1:1 with the app ── */
  .starPill{position:relative;display:inline-flex;align-items:center;justify-content:center;padding:6px 8px;margin-left:2px;
    border:none;background:transparent;color:var(--mint);cursor:pointer;overflow:visible;transition:transform .2s var(--ease),color .2s var(--ease)}
  .starDots{display:inline-flex;align-items:center;gap:3px;margin-right:5px}
  .starDot{width:3px;height:3px;border-radius:50%;background:var(--mint);opacity:.45;transition:opacity .2s var(--ease),background .2s var(--ease)}
  .starPillArmed .starDot{background:var(--gold);opacity:.7}
  .starGlyph{font-family:var(--serif);font-size:1.5rem;line-height:1;color:inherit;filter:drop-shadow(0 0 6px rgba(110,231,183,.45));transition:transform .2s var(--ease)}
  .starPill:hover .starGlyph{transform:scale(1.1)}
  .starPill:focus-visible{outline:2px solid var(--mint);outline-offset:3px;border-radius:8px}
  .starPillArmed{color:var(--gold)}
  .starPillArmed .starGlyph{filter:drop-shadow(0 0 8px rgba(241,207,122,.55));animation:armedBreathe 2.8s ease-in-out infinite}
  @keyframes armedBreathe{0%,100%{transform:scale(1);opacity:.95}50%{transform:scale(1.09);opacity:1}}
  .starPillInert{opacity:.3;cursor:default;color:var(--muted)}
  .starPillInert .starGlyph{filter:none;animation:none}
  .starPillInert:hover .starGlyph{transform:none}
  .starPillDone{opacity:.4;cursor:default;color:var(--mint)}
  .starPillDone .starGlyph{filter:none;animation:none}
  .starPillDone .starDot{background:var(--mint);opacity:.35}
  .starPillDone:hover .starGlyph{transform:none}
  .starAmt{align-self:center;font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--gold);margin-left:1px;text-shadow:0 0 9px rgba(241,207,122,.3)}

  /* small steady gold ★ beside the lift name once it's a conquered overload */
  .conqueredStar{flex:none;width:16px;height:16px;align-self:center;color:var(--gold);filter:drop-shadow(0 0 5px rgba(241,207,122,.4))}
  .conqueredStar svg{width:16px;height:16px;display:block;fill:currentColor}

  /* ── celebration: the one-time gold flush + star burst when a lift becomes a
        conquered overload (all sets logged + one beats the previous best). On-card,
        like the app — no broken full-screen overlay. Drives off .lift.celebrate;
        .lift.conquered is the quiet persistent state (gold name star + gold ★). ── */
  .lift{position:relative}
  .lift.conquered .starGlyph{color:var(--gold)}
  .lift.celebrate .pillValue{animation:goldNum 1.6s var(--ease)}
  @keyframes goldNum{0%,100%{color:inherit;text-shadow:none}26%{color:var(--gold);text-shadow:0 0 14px rgba(241,207,122,.55)}}
  .lift.celebrate .lift-name{animation:goldName 1.5s var(--ease)}
  @keyframes goldName{0%,100%{color:var(--fg)}26%{color:var(--gold);text-shadow:0 0 18px rgba(241,207,122,.45)}}
  .lift.celebrate .starPill{animation:starBig 1.15s var(--spring);color:var(--gold);opacity:1}
  .lift.celebrate .starGlyph{filter:drop-shadow(0 0 10px rgba(241,207,122,.6))}
  @keyframes starBig{0%{transform:scale(1)}30%{transform:scale(1.55)}100%{transform:scale(1)}}
  .lift.celebrate .starPill::after{content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;box-shadow:0 0 0 0 rgba(241,207,122,.6);animation:starRing 1.15s var(--ease) forwards}
  @keyframes starRing{0%{box-shadow:0 0 0 0 rgba(241,207,122,.6)}100%{box-shadow:0 0 0 30px rgba(241,207,122,0)}}

  .rows{display:flex;flex-direction:column;gap:9px}

  /* ── the set pill (real Vitality row) ── */
  .pill{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;border:1px solid var(--rule);
    background:var(--card);position:relative;overflow:hidden;min-width:0;
    transition:background .4s var(--ease),border-color .4s var(--ease),color .4s var(--ease)}
  .pillIdx{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--muted);width:20px;flex:none}
  .pillValue{font-size:19px;font-weight:500;letter-spacing:-.01em;display:inline-flex;align-items:baseline;white-space:nowrap}
  .pillInput{background:transparent;border:none;outline:none;color:inherit;font:inherit;font-weight:600;
    text-align:center;field-sizing:content;width:auto;min-width:1.4ch;padding:0 1px;border-bottom:1px solid transparent;
    transition:border-color .25s var(--ease),color .25s var(--ease)}
  .pill:hover .pillInput{border-bottom-color:rgba(110,231,183,.22)}
  .pillInput:focus{color:var(--mint);border-bottom-color:var(--mint)}
  .pillUnit{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:.7em;margin-left:3px;letter-spacing:.02em}
  .pillTimes{color:var(--muted);margin:0 7px;font-weight:400}
  .pillSpacer{flex:1}
  .pillGroup{display:inline-flex;align-items:center;gap:9px}
  .pillHit{background:none;border:none;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--mint);cursor:pointer;white-space:nowrap;padding:2px;transition:color .2s}
  .pillMiss{background:none;border:none;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);cursor:pointer;padding:2px;transition:color .2s}
  .pillMiss:hover{color:var(--rose)}
  .pillStatus{font-family:var(--serif);font-style:italic;font-size:14px;white-space:nowrap}
  .pillReset{background:none;border:none;color:currentColor;cursor:pointer;opacity:.6;padding:5px;border-radius:50%;display:inline-flex;transition:opacity .2s,background .2s}
  .pillReset:hover{opacity:1;background:rgba(0,0,0,.12)} .pillReset svg{width:13px;height:13px;display:block}
  .pillPr{font-family:var(--serif);font-style:italic;color:#a87f12}

  .pill.clean,.pill.over{background:var(--mint);border-color:var(--mint);color:#000}
  .pill.clean .pillIdx,.pill.over .pillIdx,.pill.clean .pillTimes,.pill.over .pillTimes{color:rgba(0,0,0,.55)}
  .pill.clean .pillInput,.pill.over .pillInput{color:#000}
  .pill.clean .pillUnit,.pill.over .pillUnit{color:rgba(0,0,0,.55)}
  .pill.clean .pillHit,.pill.over .pillHit,.pill.clean .pillStatus,.pill.over .pillStatus{color:#000}
  .pill.partial{background:rgba(245,158,11,.14);border-color:var(--amber);color:var(--fg)}
  .pill.partial .pillIdx,.pill.partial .pillStatus,.pill.partial .pillUnit{color:var(--amber)}
  .pill.failed{background:rgba(224,118,123,.12);border-color:var(--rose);color:var(--fg)}
  .pill.failed .pillIdx,.pill.failed .pillStatus{color:var(--rose)}
  .pill.failed .pillValue{text-decoration:line-through;color:var(--muted-strong)}

  /* ── add a lift ── */
  .add{display:flex;flex-direction:column;align-items:center;gap:9px;margin:34px 0 8px}
  .add-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--rule-strong);background:none;color:var(--mint);
    font-size:22px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:border-color .2s,transform .2s var(--spring)}
  .add-btn:hover{border-color:var(--mint)} .add-btn:active{transform:scale(.92)}
  .add-cap{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--muted)}
  .add-form{display:none;gap:9px;width:100%;max-width:360px}
  .add-form.on{display:flex}
  .add-input{flex:1;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;color:var(--fg);
    font-family:var(--sans);font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s}
  .add-input:focus{border-color:var(--mint)}
  .add-go{background:var(--mint);color:#000;border:none;border-radius:12px;font-family:var(--sans);font-weight:600;font-size:14px;padding:0 18px;cursor:pointer}

  /* ── hidden / removed lifts (never lose your data) ── */
  .hidden-bar{margin-top:30px;border-top:1px solid var(--rule);padding-top:18px}
  .hidden-bar h4{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .hidden-row{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--muted-strong)}
  .hidden-row .hn{flex:1;font-family:var(--serif);font-style:italic;font-size:17px}
  .hidden-row .keep{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--rule);border-radius:999px;padding:3px 8px}
  .restore{background:none;border:1px solid var(--rule-strong);color:var(--mint);font-family:var(--serif);font-style:italic;font-size:13px;padding:5px 13px;border-radius:999px;cursor:pointer;transition:border-color .2s}
  .restore:hover{border-color:var(--mint)}

  .footnote{text-align:center;color:var(--muted);font-size:11.5px;margin-top:26px;opacity:.8}

  /* ── modal (info card + the Episode 1 history graph) ── */
  .modal{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:22px;
    background:rgba(0,0,0,.66);opacity:0;pointer-events:none;transition:opacity .25s var(--ease);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  .modal.on{opacity:1;pointer-events:auto}
  .sheet{width:100%;max-width:440px;background:#0a0f0c;border:1px solid var(--rule-strong);border-radius:20px;padding:22px;
    transform:scale(.94) translateY(10px);transition:transform .3s var(--spring)}
  .modal.on .sheet{transform:none}
  .sheet-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mint);margin-bottom:8px}
  .sheet-title{font-family:var(--serif);font-size:26px;line-height:1.05;margin-bottom:4px}
  .sheet-sub{color:var(--muted-strong);font-size:14px;line-height:1.5;margin-bottom:16px}
  .sheet-close{position:absolute;top:14px;right:14px;width:32px;height:32px;display:grid;place-items:center;background:rgba(255,255,255,.05);border:1px solid var(--rule-strong);border-radius:50%;color:var(--muted-strong);cursor:pointer;font-size:15px;line-height:1;transition:border-color .2s,color .2s}
  .sheet-close:hover{border-color:var(--mint);color:var(--fg)}
  .sheet-stats{display:flex;gap:18px;margin-top:8px}
  .sheet-stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .sheet-stat .v{font-size:20px;font-weight:600;margin-top:5px} .sheet-stat .v.gold{color:var(--gold)} .sheet-stat .v.up{color:var(--mint-cool)}
  .chart{width:100%;margin-top:6px}
  .chart svg{width:100%;height:auto;display:block;overflow:visible}
  .ch-grid{stroke:var(--rule)} .ch-area{fill:url(#g)} .ch-line{fill:none;stroke:var(--mint);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
  .ch-dot{fill:var(--mint);stroke:#0a0f0c;stroke-width:3} .ch-dot.best{fill:var(--gold)}
  .ch-lab{fill:var(--muted);font-family:var(--mono);font-size:8px}
  .ch-cap{text-align:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--mint-cool);margin-top:10px}

  /* ════ shared card bits (ported from the real logger cards) ════ */
  .card-sub{font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5;color:var(--muted-strong);margin:4px 0 4px}
  .card-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
  .btn-ghost{background:none;border:1px solid var(--rule-strong);color:var(--muted-strong);font-family:var(--sans);font-weight:600;
    font-size:14px;padding:11px 20px;border-radius:999px;cursor:pointer;transition:border-color .2s,color .2s}
  .btn-ghost:hover{border-color:var(--mint);color:var(--fg)}
  .btn-mint{background:var(--mint);border:1px solid var(--mint);color:#04140d;font-family:var(--sans);font-weight:700;
    font-size:14px;padding:11px 22px;border-radius:999px;cursor:pointer;transition:background .2s,transform .15s var(--spring)}
  .btn-mint:hover{background:#5dd6a6} .btn-mint:active{transform:scale(.97)}

  /* ════ TUNE: icon + label rows, steppers, weight tap-to-type ════ */
  .tune{display:flex;flex-direction:column;margin:8px 0 2px}
  .tune-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 2px;border-top:1px solid var(--rule)}
  .tune-row:first-child{border-top:none}
  .tune-left{display:flex;align-items:center;gap:12px;min-width:0}
  .tune-ico{flex:none;width:17px;height:17px;color:var(--muted)}
  .tune-ico svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .tune-lab{display:flex;flex-direction:column;gap:3px}
  .tune-k{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-strong)}
  .tune-reset{align-self:flex-start;background:none;border:none;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;
    text-transform:lowercase;color:var(--rose);cursor:pointer;padding:0}
  .tune-ctrl{display:flex;align-items:center;gap:5px}
  .tune-step{width:30px;height:34px;background:none;border:none;color:rgba(255,255,255,.34);font-size:22px;line-height:1;
    cursor:pointer;display:grid;place-items:center;transition:color .2s} .tune-step:hover{color:var(--mint)}
  .tune-val{font-family:var(--serif);font-style:italic;font-size:27px;color:var(--fg);font-variant-numeric:tabular-nums;min-width:1.7ch;text-align:center}
  .tune-num{font-family:var(--serif);font-style:italic;font-size:27px;color:var(--fg);background:none;border:none;outline:none;
    text-align:right;width:auto;field-sizing:content;min-width:1.4ch;border-bottom:1.5px solid transparent;padding:0 1px;transition:border-color .25s,color .25s}
  .tune-num:focus{color:var(--mint);border-bottom-color:var(--mint)}
  .tune-unit{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:lowercase;color:var(--muted);margin-left:6px}

  /* ════ SWAP: recommendations + library search ════ */
  .swap-sec{margin-top:18px}
  .swap-lab{display:block;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .swap-rows{display:flex;flex-direction:column;gap:8px}
  .swap-row{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;color:var(--fg);
    background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;padding:13px 15px;cursor:pointer;
    transition:border-color .2s,background .2s,transform .12s var(--spring)}
  .swap-row:hover{border-color:var(--mint);background:rgba(110,231,183,.04)} .swap-row:active{transform:scale(.985)}
  .swap-nm{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .swap-meta{display:inline-flex;align-items:center;gap:9px;flex:none}
  .swap-wt{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--mint);font-variant-numeric:tabular-nums}
  .swap-wt span{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-left:3px}
  .swap-arrow{flex:none;width:14px;height:14px;color:var(--mint)} .swap-arrow svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .swap-search{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;padding:0 14px;transition:border-color .2s}
  .swap-search:focus-within{border-color:var(--mint)}
  .swap-search-ico{flex:none;width:15px;height:15px;color:var(--muted)} .swap-search-ico svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .swap-input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:var(--sans);font-size:15px;padding:13px 0}
  .swap-input::placeholder{color:var(--muted)}
  .swap-lib{display:flex;flex-direction:column;max-height:208px;overflow-y:auto;margin-top:4px}
  .swap-lib .swap-row{border:none;border-bottom:1px solid var(--rule);border-radius:0;background:none;padding:13px 4px}
  .swap-lib .swap-row:hover{background:rgba(110,231,183,.04)}
  .swap-empty{text-align:center;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);padding:18px 0 2px}
  .swap-form{display:flex;gap:9px;margin:6px 0 12px}
  .swap-input2{flex:1;background:var(--card);border:1px solid var(--rule-strong);border-radius:12px;color:var(--fg);font-family:var(--sans);font-size:15px;padding:13px 14px;outline:none;transition:border-color .2s}
  .swap-input2:focus{border-color:var(--mint)} .swap-input2::placeholder{color:var(--muted)}
  .swap-upsell{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--muted);text-align:center;line-height:1.45}
  .ov-empty{text-align:center;font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--muted);padding:10px 6px 16px;line-height:1.5}

  /* ── finish session (closes the loop: today's sets become a saved session) ── */
  .finish-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:26px 0 4px}
  .finish{display:inline-flex;align-items:center;gap:9px;background:var(--mint);color:#04140d;border:none;border-radius:999px;
    font-family:var(--sans);font-weight:700;font-size:15px;letter-spacing:-.01em;padding:14px 26px;cursor:pointer;
    box-shadow:0 10px 30px -10px rgba(110,231,183,.5);transition:transform .15s var(--spring),box-shadow .2s,opacity .2s}
  .finish:hover{transform:translateY(-2px);box-shadow:0 14px 36px -10px rgba(110,231,183,.6)} .finish:active{transform:scale(.97)}
  .finish svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .finish[disabled]{opacity:.4;cursor:default;box-shadow:none;pointer-events:none}
  .finish-cap{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted)}

  /* ════ OVERLOAD CARD: 1:1 port of the app's OverloadModal (opens on the ★) ════ */
  .po-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;
    background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:opacity .2s var(--ease)}
  .po-modal.on{opacity:1;pointer-events:auto}
  .po-card{position:relative;overflow:hidden;width:100%;max-width:380px;border:1px solid var(--rule-strong);border-radius:26px;
    background:#0a0f0c;padding:22px 22px 18px;box-shadow:0 24px 80px rgba(0,0,0,.6);
    transform:translateY(10px) scale(.985);opacity:0;transition:transform .32s var(--ease),opacity .32s var(--ease)}
  .po-modal.on .po-card{transform:none;opacity:1}
  .po-card::before{content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:320px;height:180px;
    pointer-events:none;background:radial-gradient(closest-side,rgba(110,231,183,.13),transparent 72%)}
  .po-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative}
  .po-head-l{display:flex;align-items:center;gap:10px;min-width:0}
  .po-head-ico{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;flex-shrink:0;color:rgba(110,231,183,.75)}
  .po-head-ico svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .po-eyebrow{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14px}
  .po-title{font-family:var(--serif);font-style:italic;font-size:24px;letter-spacing:-.02em;color:var(--fg);margin:2px 0 0;line-height:1.05;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .po-close{flex:none;width:30px;height:30px;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;
    display:grid;place-items:center;transition:color .2s var(--ease),background .2s var(--ease)}
  .po-close:hover{color:var(--fg);background:rgba(255,255,255,.06)}
  .po-close svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round}
  .po-body{text-align:center;padding-top:16px;position:relative}
  .po-body>.po-show,.po-body>.po-hint,.po-body>.po-confirm,.po-body>.po-remove,.po-body>.po-skip,
  .po-body>.po-choices,.po-body>.po-stepGroup,.po-body>.po-done{animation:cozyItem .46s var(--spring) backwards}
  .po-body>.po-show{animation-delay:.11s} .po-body>.po-hint{animation-delay:.18s}
  .po-body>.po-choices{animation-delay:.25s} .po-body>.po-confirm{animation-delay:.25s}
  .po-body>.po-stepGroup{animation-delay:.16s} .po-body>.po-remove{animation-delay:.3s}
  .po-body>.po-skip{animation-delay:.32s} .po-body>.po-done{animation-delay:.11s}
  @keyframes cozyItem{0%{opacity:0;transform:translateY(11px)}100%{opacity:1;transform:none}}
  .po-star{position:relative;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;margin:0 auto 9px;
    color:var(--mint);background:rgba(110,231,183,.12);font-family:var(--serif);font-size:1.25rem;line-height:1;animation:starPop .62s var(--spring)}
  .po-star::before{content:'';position:absolute;inset:-9px;border-radius:50%;z-index:-1;
    background:radial-gradient(closest-side,rgba(110,231,183,.3),transparent 72%);animation:haloBreath 3.2s ease-in-out infinite}
  .po-star.armed{color:var(--gold);background:rgba(241,207,122,.12)}
  .po-star.armed::before{background:radial-gradient(closest-side,rgba(241,207,122,.32),transparent 72%)}
  @keyframes starPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.18);opacity:1}100%{transform:scale(1)}}
  @keyframes haloBreath{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.95;transform:scale(1.18)}}
  .po-show{display:flex;flex-direction:column;gap:7px;margin:0 0 16px;padding:15px 13px;border-radius:16px;border:1px solid var(--rule);
    background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  .po-showD{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .po-showV{display:flex;justify-content:center;align-items:baseline;flex-wrap:wrap;gap:16px}
  .po-stat{font-family:var(--serif);font-style:italic;font-size:.82rem;color:var(--muted-strong)}
  .po-stat b{font-weight:400;font-size:1.5rem;color:var(--fg);margin-right:4px;font-variant-numeric:tabular-nums}
  .po-hint{font-family:var(--serif);font-style:italic;color:var(--muted-strong);font-size:14px;margin:0 0 15px}
  .po-confirm{display:block;width:100%;margin:0 0 2px;padding:14px;border:none;border-radius:14px;background:var(--mint);color:#04140d;
    font-weight:700;font-size:14px;font-family:var(--sans);cursor:pointer;transition:background .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-confirm:hover{background:var(--mint-hover);transform:translateY(-2px);box-shadow:0 10px 26px rgba(110,231,183,.22)}
  .po-confirm:active{transform:translateY(0) scale(.985)}
  .po-remove{display:block;margin:10px auto 0;background:none;border:none;color:var(--gold);font-family:var(--serif);font-style:italic;font-size:14px;cursor:pointer;opacity:.85}
  .po-remove:hover{opacity:1}
  .po-skip{display:block;margin:12px auto 0;background:none;border:none;color:var(--muted);font-family:var(--serif);font-style:italic;font-size:14px;cursor:pointer}
  .po-skip:hover{color:var(--muted-strong)}
  .po-armedBody{padding-top:8px}
  .po-armedAmt{font-family:var(--serif);font-style:italic;font-size:2.4rem;color:var(--gold);text-shadow:0 0 22px rgba(241,207,122,.3);margin:4px 0 2px}
  .po-armedLbl{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--muted);margin-bottom:18px}
  .po-choices{display:flex;gap:9px;margin-bottom:2px}
  .po-choice{flex:1;cursor:pointer;border:1px solid rgba(110,231,183,.28);border-radius:14px;padding:14px 8px;color:var(--fg);
    font-family:var(--serif);font-style:italic;font-size:16px;background:linear-gradient(180deg,rgba(110,231,183,.08),rgba(110,231,183,.03));
    transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-choice:hover{background:linear-gradient(180deg,rgba(110,231,183,.16),rgba(110,231,183,.06));border-color:rgba(110,231,183,.5);transform:translateY(-2px);box-shadow:0 8px 22px rgba(110,231,183,.13)}
  .po-choice:active{transform:translateY(0) scale(.98)}
  .po-stepBody{padding-top:22px}
  .po-stepGroup{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:18px}
  .po-stepLbl{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .po-step{display:flex;align-items:center;justify-content:center;gap:18px}
  .po-adj{width:46px;height:46px;border-radius:50%;border:1px solid rgba(110,231,183,.34);background:rgba(110,231,183,.06);color:var(--mint);
    font-size:23px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:background .2s var(--ease),color .2s var(--ease),transform .2s var(--spring),box-shadow .2s var(--ease)}
  .po-adj:hover{background:var(--mint);color:#04140d;box-shadow:0 8px 20px -8px rgba(110,231,183,.55)}
  .po-adj:active{transform:scale(.9)}
  .po-val{display:inline-flex;align-items:baseline;gap:5px;font-family:var(--serif);font-style:italic;font-size:2.05rem;color:var(--fg);
    min-width:118px;justify-content:center;padding:8px 18px;border-radius:16px;background:radial-gradient(130% 130% at 50% 0%,rgba(110,231,183,.1),transparent 72%);box-shadow:inset 0 0 0 1px rgba(110,231,183,.1)}
  .po-plus{color:var(--mint);font-size:.8em}
  .po-input{width:3.4ch;min-width:1.6ch;background:transparent;border:none;outline:none;color:var(--fg);font:inherit;text-align:center;
    -moz-appearance:textfield;appearance:textfield;border-bottom:1px solid transparent;padding:0 1px 1px;transition:border-color .2s var(--ease),color .2s var(--ease)}
  .po-input:focus{color:var(--mint);border-bottom-color:rgba(110,231,183,.55)}
  .po-input::-webkit-outer-spin-button,.po-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .po-unit{font-family:var(--serif);font-style:italic;font-size:.5em;color:var(--muted);margin-left:4px}
  .po-done{padding:22px 0 12px;text-align:center}
  .po-doneAmt{font-family:var(--serif);font-style:italic;font-size:1.55rem;color:var(--mint);animation:cozyPop .56s var(--spring)}
  .po-doneSub{font-size:12px;color:var(--muted);margin-top:7px;letter-spacing:.04em;animation:cozyItem .46s var(--spring) backwards .16s}
  @keyframes cozyPop{0%{opacity:0;transform:scale(.78)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}

  /* ── finish toast: a calm on-brand confirmation (replaces the old overlay) ── */
  .finish-cap.saved{color:var(--mint-cool);animation:savedPulse 1.8s var(--ease)}
  @keyframes savedPulse{0%{opacity:.4;transform:translateY(3px)}18%{opacity:1;transform:none}100%{opacity:1}}
</style>
</head>
<body>
<canvas id="snow"></canvas>
<div class="atmos"></div>
<div class="wrap">
  <div class="sessionLabel" id="sessionLabel"></div>
  <div class="daySeg" id="daySeg">
    <button type="button" class="dayPill" data-day="wed">Wednesday</button>
    <button type="button" class="dayPill" data-day="sun">Sunday</button>
  </div>

  <div class="top">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="count" id="count"></div>
  </div>

  <div id="list"></div>

  <div class="finish-wrap" id="finishWrap">
    <button class="finish" id="finishBtn"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg> Finish session</button>
    <div class="finish-cap" id="finishCap"></div>
  </div>

  <div class="add">
    <button class="add-btn" id="addBtn" aria-label="Add a lift">+</button>
    <div class="add-cap">add a lift</div>
    <form class="add-form" id="addForm">
      <input class="add-input" id="addInput" placeholder="Name it. Cable fly, hack squat, anything." maxlength="40" autocomplete="off">
      <button class="add-go" type="submit">Add</button>
    </form>
  </div>

  <div id="hidden"></div>

  <p class="footnote">Saved on this device. Log a set, close the tab, it is still here.</p>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="po-modal" id="poModal"><div class="po-card" id="poCard"></div></div>

<script>
  // ====================================================================
  //  A WORKOUT LOGGER, ONE FILE. Lifts, sets, and a row that grades
  //  itself the moment you log it. Tap "history" and Episode 1's
  //  progressive-overload graph opens, drawn from these same sets.
  //  Everything saves on its own. (The shape works for anything.)
  // ====================================================================

  const GLYPH = {
    chest:'<path d="M3 9c2.5-2.4 6-2.4 9 .2c3-2.6 6.5-2.6 9-.2"/><path d="M12 9.2c0 4-3.2 6-9 5.6M12 9.2c0 4 3.2 6 9 5.6"/>',
    shoulders:'<path d="M4 16a8 8 0 0 1 16 0"/><circle cx="12" cy="8" r="2.2"/>',
    arms:'<path d="M8 4v7a4 4 0 0 0 8 0V4"/><path d="M6 4h4M14 4h4"/>',
    legs:'<path d="M9 3v7l-3 11M15 3v7l3 11"/><path d="M9 10h6"/>',
    back:'<path d="M6 3v18M18 3v18M6 8h12M6 16h12"/>',
    core:'<path d="M4 15c4-3 12-3 16 0"/><path d="M6 9c3-2 9-2 12 0"/>',
  };
  const SVG = inner => '<svg viewBox="0 0 24 24">' + inner + '</svg>';
  const ICON = {
    swap:'<path d="M4 8h13l-3-3M20 16H7l3 3"/>',
    history:'<path d="M4 18l5-6 3 3 6-8"/><path d="M16 7h3v3"/>',
    tune:'<path d="M4 8h10M18 8h2M4 16h4M12 16h8"/><circle cx="16" cy="8" r="2"/><circle cx="10" cy="16" r="2"/>',
    star:'<path d="M12 2l2.9 6.1 6.6.9-4.8 4.6 1.2 6.6L12 18.5 6.1 20.8l1.2-6.6L2.5 9.6l6.6-.9z"/>',
    weight:'<path d="M4 9v6M7 7.5v9M17 7.5v9M20 9v6M7 12h10"/>',
    sets:'<path d="M12 3 20 7 12 11 4 7Z"/><path d="M4 12 12 16 20 12"/><path d="M4 17 12 21 20 17"/>',
    reps:'<path d="M17 3l3 3-3 3"/><path d="M20 6H9a5 5 0 0 0-5 5"/><path d="M7 21l-3-3 3-3"/><path d="M4 18h11a5 5 0 0 0 5-5"/>',
    rest:'<circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 13l3 2M9 3h6"/>',
    eye:'<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>',
    arrow:'<path d="M4 12h14M13 7l5 5-5 5"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  };

  // @episode-start:save-local
  // ONE store, never one-per-feature. The lifts live in memory as LIFTS, and
  // these five functions are the only doorway to disk. Everything goes through
  // them: logging a set, swap, tune, star, even Episode 1's overload graph.
  // You read with getLift, write with updateLift or addLift, and saveLog puts
  // it on disk. A new need is a new FIELD on a lift (we added rest for the tune
  // card), never a second store. Point saveLog/loadLog at Supabase instead of
  // localStorage and every feature syncs across devices, untouched (sync.sql).
  const STORE = 'vitality.logger.v3';
  let LIFTS = [];
  function loadLog(){
    try { const raw = localStorage.getItem(STORE); if (raw){ const a = JSON.parse(raw); if (Array.isArray(a)) return (LIFTS = a); } } catch(e){}
    LIFTS = SEED.map(s => ({ rest:150, history:[], ...s, id: uid(), hidden:false, sets: blankSets(s.targetSets) }));
    saveLog();
    return LIFTS;
  }
  function saveLog(){ try { localStorage.setItem(STORE, JSON.stringify(LIFTS)); } catch(e){} }
  function getLift(id){ return LIFTS.find(l => l.id === id); }
  function updateLift(id, patch){
    const lift = getLift(id); if (!lift) return;
    Object.assign(lift, typeof patch === 'function' ? patch(lift) : patch);
    saveLog();
  }
  function addLift(fields){
    LIFTS.push({ id: uid(), hidden:false, rest:150, history:[], ...fields });
    saveLog();
  }
  // @episode-end:save-local

  const uid = () => 'l' + Math.random().toString(36).slice(2,9);
  const blankSets = n => Array.from({length:n}, () => ({ weight:null, reps:null, done:false, failed:false }));
  // a few past sessions so "history" has a real line to draw (top-set weight)
  const hist = (base, step, reps) => Array.from({length:6}, (_,i) => ({ w: base + i*step, r: reps }));

  // Your program. No exercise library — these are the two sessions you told
  // me to log (Wednesday / Sunday); the + button still lets you add anything.
  // Fresh start: history is empty, so the graph and progressive-overload
  // "conquered" state build up from here rather than fake demo data.
  const SEED = [
    // Wednesday
    { name:'Squat',                        tier:1, muscle:'legs',  day:'wed', targetSets:4, targetReps:6,  weight:80 },
    { name:'Trap bar deadlift',            tier:1, muscle:'legs',  day:'wed', targetSets:4, targetReps:6,  weight:80 },
    { name:'Bulgarian split squat',        tier:2, muscle:'legs',  day:'wed', targetSets:3, targetReps:12, weight:20, perHand:true },
    { name:'RDL',                          tier:2, muscle:'legs',  day:'wed', targetSets:3, targetReps:10, weight:60 },
    { name:'Nordics',                      tier:3, muscle:'legs',  day:'wed', targetSets:3, targetReps:8,  weight:0 },
    { name:'Bench press',                  tier:1, muscle:'chest', day:'wed', targetSets:4, targetReps:8,  weight:60 },
    { name:'Pull-ups',                     tier:2, muscle:'back',  day:'wed', targetSets:4, targetReps:10, weight:0 },
    { name:'Copenhagen plank',             tier:3, muscle:'core',  day:'wed', targetSets:3, targetReps:30, weight:0 },
    { name:'Pallof press',                 tier:3, muscle:'core',  day:'wed', targetSets:3, targetReps:15, weight:10 },
    { name:'Box jumps',                    tier:3, muscle:'legs',  day:'wed', targetSets:3, targetReps:8,  weight:0 },
    { name:'Pogos',                        tier:3, muscle:'legs',  day:'wed', targetSets:3, targetReps:20, weight:0 },
    { name:'Accelerations',                tier:3, muscle:'legs',  day:'wed', targetSets:4, targetReps:6,  weight:0 },

    // Sunday
    { name:'Speed trap bar deadlift',      tier:1, muscle:'legs',     day:'sun', targetSets:5, targetReps:5,  weight:60 },
    { name:'Single-leg hip thrust',        tier:2, muscle:'legs',     day:'sun', targetSets:3, targetReps:12, weight:20 },
    { name:'Copenhagen plank',             tier:3, muscle:'core',     day:'sun', targetSets:3, targetReps:30, weight:0 },
    { name:'Single-arm landmine press',    tier:2, muscle:'shoulders',day:'sun', targetSets:3, targetReps:12, weight:15, perHand:true },
    { name:'Bent-over row',                tier:1, muscle:'back',    day:'sun', targetSets:4, targetReps:10, weight:50 },
    { name:'Hip flexor KB hold',           tier:3, muscle:'core',    day:'sun', targetSets:3, targetReps:30, weight:8 },
    { name:'Isometric calf raise',         tier:3, muscle:'legs',    day:'sun', targetSets:3, targetReps:30, weight:10 },
    { name:'Tibialis raises',              tier:3, muscle:'legs',    day:'sun', targetSets:3, targetReps:15, weight:0 },
  ];

  const DAY_KEY = 'vitality.logger.day.v1';
  function loadDay(){
    try { const d = localStorage.getItem(DAY_KEY); if (d === 'wed' || d === 'sun') return d; } catch(e){}
    return new Date().getDay() === 0 ? 'sun' : 'wed';  // Sunday defaults to Sunday's session, every other day to Wednesday's
  }
  function saveDay(d){ try { localStorage.setItem(DAY_KEY, d); } catch(e){} }
  let currentDay = loadDay();
  function renderDaySeg(){
    document.querySelectorAll('.dayPill').forEach(b => b.classList.toggle('active', b.dataset.day === currentDay));
    const lbl = document.getElementById('sessionLabel');
    if (lbl) lbl.textContent = (currentDay === 'sun' ? 'Sunday' : 'Wednesday') + ' Session';
  }
  document.querySelectorAll('.dayPill').forEach(b => b.onclick = () => { currentDay = b.dataset.day; saveDay(currentDay); render(); });

  loadLog();

  const listEl = document.getElementById('list');
  const hiddenEl = document.getElementById('hidden');

  // @episode-start:grade
  // The whole point: grade a set the instant it is logged. Beat the target
  // (heavier OR more reps) and it turns mint. Hit it exactly, still mint.
  // Fall short on reps and it is a calm amber, never a failure. A tapped
  // "miss" is rose. The state is the feedback — words just confirm it.
  function gradeSet(lift, set){
    if (set.failed) return 'failed';
    if (!set.done) return 'empty';
    const beatWeight = set.weight > lift.weight;
    const beatReps   = set.reps   > lift.targetReps;
    const metWeight  = set.weight >= lift.weight;
    const metReps    = set.reps   >= lift.targetReps;
    if (metWeight && metReps) return (beatWeight || beatReps) ? 'over' : 'clean';
    return 'partial';
  }
  function statusWord(lift, set, kind){
    if (kind === 'failed') return 'missed';
    if (kind === 'over'){ const d = set.reps - lift.targetReps; return d > 0 ? 'done · +' + d : 'done'; }
    if (kind === 'partial'){ const d = set.reps - lift.targetReps; return d < 0 ? 'partial · ' + d : 'partial'; }
    return 'done';
  }
  // @episode-end:grade

  // @episode-start:progress
  // One honest number across the visible lifts: how many sets are logged out
  // of how many you set out to do. A miss still counts as logged — you showed
  // up for it. Hidden lifts never count.
  function progress(){
    let logged = 0, total = 0;
    LIFTS.filter(l => !l.hidden && l.day === currentDay).forEach(l => {
      l.sets.forEach(s => { total++; if (s.done || s.failed) logged++; });
    });
    return { logged, total };
  }
  function paintProgress(){
    const { logged, total } = progress();
    document.getElementById('fill').style.width = total ? (logged/total*100) + '%' : '0%';
    document.getElementById('count').innerHTML = '<b>' + logged + '</b> of ' + total + ' logged';
  }
  // @episode-end:progress

  // ── render ──
  function render(){
    renderDaySeg();
    listEl.innerHTML = '';
    LIFTS.filter(l => !l.hidden && l.day === currentDay).forEach(lift => listEl.appendChild(liftCard(lift)));
    renderHidden();
    paintProgress();
    paintFinish();
    syncCelebrations();  // fires the on-card gold burst for any lift that just got conquered
  }

  function liftCard(lift){
    const el = document.createElement('div');
    const conquered = isConquered(lift);
    el.className = 'lift' + (conquered ? ' conquered' : '') + (celebratingIds.has(lift.id) ? ' celebrate' : '');
    el.dataset.id = lift.id;
    const unit = lift.perHand ? 'kg/ea' : 'kg';
    // ★ overload state — matches the app: armed (gold, breathing) before you lift,
    // inert (dim) once any set is logged, done (calm) once the goal is met.
    const anyLogged = lift.sets.some(s => s.done || s.failed);
    const bump = lift.overload || null;
    const armed = !!bump && ((bump.weightKg || 0) > 0 || (bump.reps || 0) > 0);
    const goalMet = overloadGoalMet(lift);
    const starCls = 'starPill' +
      (armed && !goalMet ? ' starPillArmed' : '') +
      (goalMet ? ' starPillDone' : '') +
      (anyLogged && !goalMet ? ' starPillInert' : '');
    const starAmt = armed && !goalMet ? bumpLabel(bump) : '';
    el.innerHTML =
      '<div class="lift-head">' +
        '<span class="glyph" title="Drag to reorder">' + SVG(GLYPH[lift.muscle] || GLYPH.chest) + '</span>' +
        '<span class="lift-name">' + esc(lift.name) + '</span>' +
        '<span class="info" title="About this lift">i</span>' +
        (conquered ? '<span class="conqueredStar" title="Progressive overload conquered">' + SVG(ICON.star) + '</span>' : '') +
        '<span class="sp"></span>' +
        '<button class="lift-x" title="Remove (kept, never deleted)"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>' +
      '</div>' +
      '<div class="lift-meta"><span class="tierchip">TIER ' + lift.tier + '</span> &middot; <b>' + lift.targetSets + ' &times; ' + lift.targetReps + '</b> &middot; last ' + lift.weight + ' ' + unit + '</div>' +
      '<div class="chips">' +
        '<button class="chip" data-act="swap">' + SVG(ICON.swap) + 'swap</button>' +
        '<button class="chip" data-act="history">' + SVG(ICON.history) + 'history</button>' +
        '<button class="chip" data-act="tune">' + SVG(ICON.tune) + 'tune</button>' +
        '<button class="' + starCls + '" data-act="star" aria-label="Progressive overload"' + (anyLogged ? ' disabled' : '') + '>' +
          '<span class="starDots" aria-hidden><span class="starDot"></span><span class="starDot"></span></span>' +
          '<span class="starGlyph" aria-hidden>&#9733;</span>' +
        '</button>' +
        (starAmt ? '<span class="starAmt">' + esc(starAmt) + '</span>' : '') +
      '</div>' +
      '<div class="rows"></div>';
    const rows = el.querySelector('.rows');
    lift.sets.forEach((set, i) => rows.appendChild(setRow(lift, set, i, unit)));
    el.querySelector('.lift-x').onclick = () => hideLift(lift.id);
    el.querySelector('.info').onclick = () => openInfo(lift);
    el.querySelector('[data-act="swap"]').onclick = () => openSwap(lift);
    el.querySelector('[data-act="history"]').onclick = () => openOverload(lift);
    el.querySelector('[data-act="tune"]').onclick = () => openTune(lift);
    const starBtn = el.querySelector('[data-act="star"]');
    starBtn.onclick = () => { if (anyLogged) return; openOverloadCard(lift); };
    wireDrag(el, el.querySelector('.glyph'));
    return el;
  }

  // @episode-start:set-row
  // One set row. Tap the numbers to edit, "hit it" to log the typed values,
  // "miss" to fail it, the reset to clear it. It re-grades itself on every
  // change. The numbers carry over from your last target, so logging is two
  // taps on a good day.
  function setRow(lift, set, i, unit){
    const kind = gradeSet(lift, set);
    const logged = kind !== 'empty';
    // Seed unlogged rows from the armed overload bump: +kg lifts the weight,
    // +reps lifts the target. Once a set is logged it keeps its own numbers.
    const bump = lift.overload || null;
    const w = set.weight ?? (lift.weight + (bump ? (bump.weightKg || 0) : 0));
    const r = set.reps ?? (lift.targetReps + (bump ? (bump.reps || 0) : 0));
    const roman = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'][i] || (i+1);
    const row = document.createElement('div');
    row.className = 'pill ' + kind;
    row.innerHTML =
      '<span class="pillIdx">' + roman + '</span>' +
      '<span class="pillValue">' +
        '<input class="pillInput" type="text" inputmode="decimal" value="' + w + '" aria-label="weight">' +
        '<span class="pillUnit">' + unit + '</span>' +
        '<span class="pillTimes">&times;</span>' +
        '<input class="pillInput" type="text" inputmode="numeric" value="' + r + '" aria-label="reps">' +
      '</span>' +
      '<span class="pillSpacer"></span>' +
      '<div class="pillGroup"></div>';
    const [wIn, rIn] = row.querySelectorAll('.pillInput');
    // cross-browser auto-width: field-sizing covers modern browsers, the size
    // attribute (text inputs) covers Safari so "32.5" never clips to "32."
    const fit = el => el.setAttribute('size', Math.max(1, el.value.length));
    fit(wIn); fit(rIn);
    wIn.addEventListener('input', () => fit(wIn));
    rIn.addEventListener('input', () => fit(rIn));
    const group = row.querySelector('.pillGroup');
    const commit = () => {
      const wv = parseFloat(wIn.value), rv = Math.round(parseFloat(rIn.value));
      if (!isFinite(wv) || wv < 0 || wv > 1000) return;
      if (!isFinite(rv) || rv <= 0 || rv > 100) return;
      set.weight = wv; set.reps = rv; set.done = true; set.failed = false;
      saveLog(); render();  // render() fires the on-card gold burst if this lift just got conquered
    };
    if (logged){
      const word = statusWord(lift, set, kind);
      group.innerHTML = '<span class="pillStatus">' + (kind==='over' ? '<span class="pillPr">&#9733; </span>' : '') + word + '</span>' +
        '<button class="pillReset" title="Reset this set"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 5.5 A4 4 0 1 0 5.5 2.5"/><polyline points="2 2 3.5 5.5 7 4.5"/></svg></button>';
      group.querySelector('.pillReset').onclick = () => { set.done=false; set.failed=false; set.weight=null; set.reps=null; saveLog(); render(); };
    } else {
      group.innerHTML = '<button class="pillHit">hit it &rarr;</button><button class="pillMiss">miss</button>';
      group.querySelector('.pillHit').onclick = commit;
      group.querySelector('.pillMiss').onclick = () => { set.failed=true; set.done=false; saveLog(); render(); };
    }
    wIn.onkeydown = rIn.onkeydown = e => { if (e.key === 'Enter'){ e.preventDefault(); commit(); } };
    return row;
  }
  // @episode-end:set-row

  // @episode-start:add-lift
  // Add a lift with nothing but a name. No exercise library to wade through,
  // no setup. Type "Cable fly", get a card with sets ready to log. It writes
  // through the same store as everything else (addLift), so the new lift saves
  // the instant it appears. The same move adds "Rent" or "Pages read" if you
  // point this at your money or your books instead.
  function quickAddLift(name){
    name = name.trim();
    if (!name) return;
    addLift({ name, tier:3, muscle:null, targetSets:3, targetReps:8, weight:20, day: currentDay, sets: blankSets(3) });
    render();
  }
  // @episode-end:add-lift

  // @episode-start:soft-delete
  // Remove a lift and it is only HIDDEN, never destroyed. Its history stays
  // in storage, so a mis-tap can't wipe a month of progress. It drops into a
  // "kept" list you can restore from with one tap. This is the difference
  // between a tool you trust and one you are scared to touch.
  function hideLift(id){
    const l = LIFTS.find(x => x.id === id);
    if (l){ l.hidden = true; saveLog(); render(); }
  }
  function restoreLift(id){
    const l = LIFTS.find(x => x.id === id);
    if (l){ l.hidden = false; saveLog(); render(); }
  }
  // @episode-end:soft-delete

  function renderHidden(){
    const hid = LIFTS.filter(l => l.hidden && l.day === currentDay);
    if (!hid.length){ hiddenEl.innerHTML = ''; return; }
    hiddenEl.innerHTML = '<div class="hidden-bar"><h4>' + hid.length + ' removed &middot; nothing lost</h4></div>';
    const bar = hiddenEl.querySelector('.hidden-bar');
    hid.forEach(l => {
      const row = document.createElement('div');
      row.className = 'hidden-row';
      row.innerHTML = '<span class="hn">' + esc(l.name) + '</span><span class="keep">history kept</span><button class="restore">restore</button>';
      row.querySelector('.restore').onclick = () => restoreLift(l.id);
      bar.appendChild(row);
    });
  }

  // @episode-start:reorder
  // Drag a lift by its handle to reorder the session. We track the pointer
  // against each card's midpoint and slot the dragged lift into place, then
  // save the new order so it sticks. Order is part of your data too.
  function wireDrag(card, handle){
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      card.classList.add('dragging');
      const move = ev => {
        const others = [...listEl.querySelectorAll('.lift:not(.dragging)')];
        const after = others.find(c => ev.clientY < c.getBoundingClientRect().top + c.offsetHeight/2);
        if (after) listEl.insertBefore(card, after); else listEl.appendChild(card);
      };
      const up = () => {
        card.classList.remove('dragging');
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup', up);
        const order = [...listEl.querySelectorAll('.lift')].map(c => c.dataset.id);
        LIFTS.sort((a,b) => {
          const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
          if (ia === -1 || ib === -1) return 0;
          return ia - ib;
        });
        saveLog();
      };
      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup', up);
    });
  }
  // @episode-end:reorder

  // ── modal: info card + the Episode 1 history graph ──
  const modal = document.getElementById('modal');
  const sheet = document.getElementById('sheet');
  function openSheet(html){ sheet.innerHTML = '<button class="sheet-close" aria-label="Close">&times;</button>' + html; sheet.querySelector('.sheet-close').onclick = closeSheet; modal.classList.add('on'); }
  function closeSheet(){ modal.classList.remove('on'); }
  modal.addEventListener('click', e => { if (e.target === modal) closeSheet(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

  // info card: a plain-language note on the lift and how to beat it
  function openInfo(lift){
    const unit = lift.perHand ? 'kg/ea' : 'kg';
    openSheet(
      '<div class="sheet-eyebrow">About this lift</div>' +
      '<div class="sheet-title">' + esc(lift.name) + '</div>' +
      '<div class="sheet-sub">Tier ' + lift.tier + ' lift. To beat your best, go heavier than ' + lift.weight + ' ' + unit + ', or hit ' + lift.weight + ' ' + unit + ' for one more rep than ' + lift.targetReps + '.</div>' +
      '<div class="sheet-stats">' +
        '<div class="sheet-stat"><div class="k">Target</div><div class="v">' + lift.targetSets + ' &times; ' + lift.targetReps + '</div></div>' +
        '<div class="sheet-stat"><div class="k">Last</div><div class="v">' + lift.weight + ' ' + unit + '</div></div>' +
      '</div>');
  }

  // swap (free standalone): keep it dead simple. Type the new movement and it
  // starts fresh in this slot, written through updateLift. The smart version
  // (matched-weight recommendations, a full exercise library) needs a database,
  // so that is a Vitality feature, not something we fake in a single file.
  const round05 = n => Math.round(n * 2) / 2;
  function guessMuscle(name){
    const n = name.toLowerCase();
    if (/curl|tricep|pushdown|skull|extension|preacher/.test(n)) return 'arms';
    if (/ohp|shoulder|lateral|delt|arnold|overhead|face pull/.test(n)) return 'shoulders';
    if (/press|bench|fly|dip|push-?up|pec/.test(n)) return 'chest';
    return null;
  }
  function openSwap(lift){
    const doSwap = name => {
      name = (name || '').trim(); if (!name) return;
      updateLift(lift.id, { name, muscle: guessMuscle(name) || lift.muscle, sets: blankSets(lift.targetSets) });
      render(); closeSheet();
    };
    openSheet(
      '<div class="sheet-eyebrow">Swap &middot; today</div>' +
      '<div class="sheet-title">' + esc(lift.name) + '</div>' +
      '<div class="card-sub">Swap this movement for today. Type the new one and it starts fresh in this slot.</div>' +
      '<form class="swap-form"><input class="swap-input2" placeholder="Cable fly, hack squat, anything" maxlength="40" autocomplete="off"><button class="btn-mint" type="submit">Swap</button></form>' +
      '<div class="swap-upsell">In Vitality, swap matches the weight for you from a full exercise library.</div>'
    );
    const form = sheet.querySelector('.swap-form');
    const input = form.querySelector('.swap-input2');
    form.onsubmit = e => { e.preventDefault(); doSwap(input.value); };
    input.focus();
  }

  // tune: set the targets and the weight to beat, then save. Edits stay in a
  // draft until you hit save, then one updateLift writes weight, sets, reps and
  // rest together. Changing the set count reshapes the rows but keeps every set
  // you already logged, by index.
  const fmtN = n => (Math.round(n * 10) / 10).toString();
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  function reshapeSets(lift, n){
    const out = [];
    for (let i = 0; i < n; i++) out.push(lift.sets[i] || { weight:null, reps:null, done:false, failed:false });
    return out;
  }
  function openTune(lift){
    const unit = lift.perHand ? 'kg/ea' : 'kg';
    const muscleLabel = { chest:'Chest', shoulders:'Shoulders', arms:'Arms' }[lift.muscle] || 'Lift';
    const DEFAULT_REST = 150;
    const d = { weight: lift.weight, targetSets: lift.targetSets, targetReps: lift.targetReps, rest: lift.rest ?? DEFAULT_REST };
    const fmtRest = s => Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    const stepRow = (k, icon, label, val) =>
      '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(icon) + '</span><span class="tune-lab"><span class="tune-k">' + label + '</span></span></span>' +
      '<span class="tune-ctrl"><button class="tune-step" data-k="' + k + '" data-d="-1" aria-label="decrease">&minus;</button>' +
      '<span class="tune-val">' + val + '</span>' +
      '<button class="tune-step" data-k="' + k + '" data-d="1" aria-label="increase">+</button></span></div>';
    function paint(){
      openSheet(
        '<div class="sheet-eyebrow">Tune &middot; ' + muscleLabel + '</div>' +
        '<div class="sheet-title">' + esc(lift.name) + '</div>' +
        '<div class="tune">' +
          '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(ICON.weight) + '</span><span class="tune-lab"><span class="tune-k">Weight</span></span></span>' +
            '<span class="tune-ctrl"><input class="tune-num" id="tWeight" inputmode="decimal" value="' + fmtN(d.weight) + '"><span class="tune-unit">' + unit + '</span></span></div>' +
          stepRow('sets', ICON.sets, 'Sets', d.targetSets) +
          stepRow('reps', ICON.reps, 'Reps', d.targetReps) +
          '<div class="tune-row"><span class="tune-left"><span class="tune-ico">' + SVG(ICON.rest) + '</span><span class="tune-lab"><span class="tune-k">Rest</span>' +
            (d.rest !== DEFAULT_REST ? '<button class="tune-reset" data-act="rest-reset">reset</button>' : '') + '</span></span>' +
            '<span class="tune-ctrl"><button class="tune-step" data-k="rest" data-d="-1" aria-label="less rest">&minus;</button>' +
            '<span class="tune-val">' + fmtRest(d.rest) + '</span>' +
            '<button class="tune-step" data-k="rest" data-d="1" aria-label="more rest">+</button></span></div>' +
        '</div>' +
        '<div class="card-foot"><button class="btn-ghost" data-act="cancel">cancel</button><button class="btn-mint" data-act="save">save</button></div>'
      );
      const wIn = sheet.querySelector('#tWeight');
      const readW = () => { const v = parseFloat(wIn.value); if (isFinite(v)) d.weight = clamp(v, 0, 1000); };
      wIn.oninput = readW;
      sheet.querySelectorAll('.tune-step').forEach(b => b.onclick = () => {
        readW();
        const k = b.dataset.k, dir = parseInt(b.dataset.d, 10);
        if (k === 'sets') d.targetSets = clamp(d.targetSets + dir, 1, 8);
        else if (k === 'reps') d.targetReps = clamp(d.targetReps + dir, 1, 30);
        else if (k === 'rest') d.rest = clamp(d.rest + dir * 15, 0, 600);
        paint();
      });
      const rr = sheet.querySelector('[data-act="rest-reset"]'); if (rr) rr.onclick = () => { d.rest = DEFAULT_REST; paint(); };
      sheet.querySelector('[data-act="cancel"]').onclick = closeSheet;
      sheet.querySelector('[data-act="save"]').onclick = () => {
        readW();
        updateLift(lift.id, l => ({ weight: d.weight, targetSets: d.targetSets, targetReps: d.targetReps, rest: d.rest, sets: reshapeSets(l, d.targetSets) }));
        render(); closeSheet();
      };
    }
    paint();
  }

  const pad2 = n => String(n).padStart(2, '0');
  const ymdKey = d => d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  function offsetDate(days){ const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + days); return ymdKey(d); }
  // turn a lift's history (+ today's logged sets) into a chartable session list
  function liftSessions(lift){
    const h = lift.history || [];
    const sessions = h.map((s, i) => ({
      date: s.date || offsetDate(-((h.length - i) * 4 + 1)),
      kg: s.w,
      sets: s.sets || Array.from({ length: Math.max(1, lift.targetSets) }, () => ({ r: s.r }))
    }));
    const logged = lift.sets.filter(s => s.done || s.failed);
    if (logged.length){
      const top = lift.sets.filter(s => s.done && !s.failed);
      sessions.push({
        date: offsetDate(0),
        kg: top.length ? Math.max(...top.map(s => s.weight)) : lift.weight,
        sets: logged.map(s => ({ r: s.reps || 0, fail: !!s.failed }))
      });
    }
    return sessions;
  }
  // history opens an inline chart in the same sheet modal everything else
  // uses — no second file to keep in sync, this stays one file as promised.
  function buildChartSVG(sessions){
    if (!sessions.length) return '<div class="ov-empty">No sessions logged yet — finish a session to start the graph.</div>';
    const W = 400, H = 140, pad = 12;
    const vals = sessions.map(s => s.kg);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const stepX = sessions.length > 1 ? (W - 2*pad) / (sessions.length - 1) : 0;
    const pts = sessions.map((s, i) => ({
      x: pad + i * stepX,
      y: H - pad - ((s.kg - min) / range) * (H - 2*pad),
      kg: s.kg, best: s.kg === max
    }));
    const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    const area = line + ' L' + pts[pts.length-1].x.toFixed(1) + ',' + (H-pad) + ' L' + pts[0].x.toFixed(1) + ',' + (H-pad) + ' Z';
    const dots = pts.map(p => '<circle class="ch-dot' + (p.best ? ' best' : '') + '" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.2"></circle>').join('');
    const delta = sessions[sessions.length-1].kg - sessions[0].kg;
    const cap = sessions.length > 1
      ? '<div class="ch-cap">' + (delta >= 0 ? '+' : '') + fmtN(delta) + ' kg since first logged session</div>'
      : '<div class="ch-cap">First session logged — the graph grows from here.</div>';
    return '<div class="chart"><svg viewBox="0 0 ' + W + ' ' + H + '"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.35"/><stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/></linearGradient></defs>' +
      '<line class="ch-grid" x1="0" y1="' + (H-pad) + '" x2="' + W + '" y2="' + (H-pad) + '"/>' +
      '<path class="ch-area" d="' + area + '"/><path class="ch-line" d="' + line + '"/>' + dots + '</svg></div>' + cap;
  }
  function openOverload(lift){
    openSheet(
      '<div class="sheet-eyebrow">History</div>' +
      '<div class="sheet-title">' + esc(lift.name) + '</div>' +
      buildChartSVG(liftSessions(lift))
    );
  }

  // @episode-start:overload-card
  // The ★ overload card — 1:1 with the app's OverloadModal. Tap the ★ (before any
  // set is logged) to plan today's push: "add a rep" (one tap, +1 rep) or "add
  // 2.5 kg" (a fine stepper you can free-type). Arming writes lift.overload through
  // the ONE store, which seeds the set rows. Screens: choices · step · armed · done.
  const poModal = document.getElementById('poModal');
  const poCard = document.getElementById('poCard');
  const STEP_DISP = 1.25;     // finest plate step (metric)
  const DEFAULT_DISP = 2.5;   // the smart default nudge
  let poLift = null;
  function openOverloadCard(lift){
    poLift = lift;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    poRender(isArmed ? 'armed' : 'choices', DEFAULT_DISP);
    poModal.classList.add('on');
  }
  function closeOverloadCard(){ poModal.classList.remove('on'); poLift = null; }
  function poArm(bump){ updateLift(poLift.id, { overload: bump }); render(); }
  function poClear(){ updateLift(poLift.id, { overload: null }); render(); closeOverloadCard(); }
  function poApplied(bump){ poArm(bump); poRender('done', 0, bumpLabel(bump)); setTimeout(closeOverloadCard, 1150); }
  function poRender(view, weightDisp, doneLabel){
    const lift = poLift; if (!lift) return;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    // "last session" readout — prior session if there is one, else the saved targets
    const last = (lift.history || [])[(lift.history || []).length - 1] || null;
    const lastSets = last && last.sets ? last.sets.length : lift.targetSets;
    const lastReps = last ? (last.r || lift.targetReps) : lift.targetReps;
    const lastWeight = last ? last.w : lift.weight;
    const head =
      '<div class="po-head"><div class="po-head-l">' +
        '<span class="po-head-ico" aria-hidden>' + SVG(GLYPH[lift.muscle] || GLYPH.chest) + '</span>' +
        '<div><div class="po-eyebrow">overload</div><div class="po-title">' + esc(lift.name) + '</div></div>' +
      '</div><button class="po-close" data-act="close" aria-label="Close"><svg viewBox="0 0 14 14"><path d="M3.5 3.5 L10.5 10.5 M10.5 3.5 L3.5 10.5"/></svg></button></div>';
    let body;
    if (view === 'done'){
      body = '<div class="po-body"><div class="po-done"><div class="po-doneAmt">' + esc(doneLabel || '') + '</div><div class="po-doneSub">on your sets for today</div></div></div>';
    } else if (view === 'armed'){
      body =
        '<div class="po-body po-armedBody">' +
          '<div class="po-star armed" aria-hidden>&#9733;</div>' +
          '<div class="po-armedAmt">' + esc(b ? bumpLabel(b) : '') + '</div>' +
          '<div class="po-armedLbl">locked onto this lift</div>' +
          '<div class="po-choices"><button class="po-choice" data-act="edit">edit</button><button class="po-choice" data-act="clear">clear it</button></div>' +
          '<button class="po-skip" data-act="close">done</button>' +
        '</div>';
    } else if (view === 'step'){
      body =
        '<div class="po-body po-stepBody"><div class="po-stepGroup"><span class="po-stepLbl">add weight</span>' +
          '<div class="po-step"><button class="po-adj" data-act="minus" aria-label="Less weight">&minus;</button>' +
            '<span class="po-val"><span class="po-plus">+</span><input class="po-input" id="poInput" inputmode="decimal" value="' + fmtN(weightDisp) + '" aria-label="Added weight"><span class="po-unit">kg</span></span>' +
            '<button class="po-adj" data-act="plus" aria-label="More weight">+</button></div></div>' +
          '<button class="po-confirm" data-act="confirm">add it</button>' +
          '<button class="po-skip" data-act="back">back</button></div>';
    } else { // choices
      body =
        '<div class="po-body"><div class="po-star" aria-hidden>&#9733;</div>' +
          '<div class="po-show"><span class="po-showD">last session</span><span class="po-showV">' +
            '<span class="po-stat"><b>' + lastSets + '</b> sets</span>' +
            '<span class="po-stat"><b>' + lastReps + '</b> reps</span>' +
            '<span class="po-stat"><b>' + fmtN(lastWeight) + '</b> kg</span></span></div>' +
          '<p class="po-hint">How much do you want to push today?</p>' +
          '<div class="po-choices"><button class="po-choice" data-act="addrep">add a rep</button><button class="po-choice" data-act="addweight">add ' + DEFAULT_DISP + ' kg</button></div>' +
          (isArmed ? '<button class="po-remove" data-act="clear">clear it</button>' : '') +
          '<button class="po-skip" data-act="close">not right now</button></div>';
    }
    poCard.innerHTML = head + body;
    const seed = (b && b.weightKg > 0) ? b.weightKg : DEFAULT_DISP;
    poCard.querySelectorAll('[data-act]').forEach(node => {
      const act = node.dataset.act;
      node.onclick = () => {
        if (act === 'close') closeOverloadCard();
        else if (act === 'clear') poClear();
        else if (act === 'addrep') poApplied({ weightKg: 0, reps: 1 });
        else if (act === 'addweight' || act === 'edit') poRender('step', seed);
        else if (act === 'back') poRender('choices', DEFAULT_DISP);
        else if (act === 'minus' || act === 'plus'){
          const inp = poCard.querySelector('#poInput');
          let v = parseFloat(inp.value); if (!isFinite(v)) v = 0;
          inp.value = fmtN(Math.max(0, Math.round((v + (act === 'plus' ? 1 : -1) * STEP_DISP) * 100) / 100));
        } else if (act === 'confirm') confirmStep();
      };
    });
    const inp = poCard.querySelector('#poInput');
    function confirmStep(){
      const v = parseFloat(poCard.querySelector('#poInput').value);
      if (!isFinite(v) || v <= 0) return;
      poApplied({ weightKg: Math.round(v * 100) / 100, reps: 0 });
    }
    if (inp) inp.onkeydown = e => { if (e.key === 'Enter'){ e.preventDefault(); confirmStep(); } };
  }
  poModal.addEventListener('click', e => { if (e.target === poModal) closeOverloadCard(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && poModal.classList.contains('on')) closeOverloadCard(); });
  // @episode-end:overload-card

  // @episode-start:overload-celebrate
  // The progressive-overload payoff, ported 1:1 from the app. A lift is CONQUERED
  // when every set is logged AND at least one done set beats the PREVIOUS best
  // (history only, never today's own sets) — so the payoff lands on the final set,
  // not the first. Crossing into conquered flushes the card gold once (the ★ bursts,
  // the numbers + name glow), then a small steady gold ★ settles beside the name.
  // Fully reversible: unlog below the overload and the mark clears. No overlay.
  function prevBestOf(lift){
    let best = null;
    (lift.history || []).forEach(s => {
      const w = s.w || 0, r = s.r || 0;
      if (!best || w > best.weight || (w === best.weight && r > best.reps)) best = { weight: w, reps: r };
    });
    return best;
  }
  function beatsPrevBest(lift, set){
    const best = prevBestOf(lift);
    if (!best || best.weight <= 0) return false;
    if (set.weight > best.weight) return true;
    return set.weight === best.weight && set.reps > best.reps;
  }
  function isConquered(lift){
    const rows = lift.sets || [];
    if (!rows.length) return false;
    if (!rows.every(s => s.done || s.failed)) return false;
    return rows.some(s => s.done && !s.failed && s.weight > 0 && s.reps > 0 && beatsPrevBest(lift, s));
  }
  // The armed overload's goal is met once a logged set hits base+bump on both axes.
  function overloadGoalMet(lift){
    const b = lift.overload; if (!b) return false;
    const tW = lift.weight + (b.weightKg || 0);
    const tR = lift.targetReps + (b.reps || 0);
    return lift.sets.some(s => s.done && !s.failed && s.weight >= tW && s.reps >= tR);
  }
  // "+2.5 kg", "+1 rep", or "+2.5 kg · +2 reps"
  function bumpLabel(b){
    const parts = [];
    if ((b.weightKg || 0) > 0) parts.push('+' + fmtN(b.weightKg) + ' kg');
    if ((b.reps || 0) > 0) parts.push('+' + b.reps + ' rep' + (b.reps > 1 ? 's' : ''));
    return parts.join(' · ') || 'no change';
  }

  // Fire the one-time gold burst on the TRANSITION into conquered. render() rebuilds
  // the list each time, so liftCard re-applies the class to lifts still mid-burst;
  // this only STARTS the burst (+ a 1.6s timer) for lifts newly crossing the line.
  const celebratingIds = new Set();
  let conqueredPrev = new Set();
  function currentConquered(){
    const s = new Set();
    LIFTS.filter(l => !l.hidden && l.day === currentDay).forEach(l => { if (isConquered(l)) s.add(l.id); });
    return s;
  }
  function syncCelebrations(){
    const now = currentConquered();
    now.forEach(id => {
      if (!conqueredPrev.has(id) && !celebratingIds.has(id)){
        celebratingIds.add(id);
        const card = listEl.querySelector('.lift[data-id="' + id + '"]');
        if (card) card.classList.add('celebrate');
        setTimeout(() => {
          celebratingIds.delete(id);
          const c = listEl.querySelector('.lift[data-id="' + id + '"]');
          if (c) c.classList.remove('celebrate');
        }, 1600);
      }
    });
    conqueredPrev = now;
  }
  // @episode-end:overload-celebrate

  // ── finish session: today's logged sets become a saved session, the graph
  //    grows, and the rows reset for next time. This is the loop made whole. ──
  function finishSession(){
    let lifts = 0, totalSets = 0;
    LIFTS.filter(l => !l.hidden && l.day === currentDay).forEach(lift => {
      const logged = lift.sets.filter(s => s.done || s.failed);
      if (!logged.length) return;
      const top = lift.sets.filter(s => s.done && !s.failed);
      const kg = top.length ? Math.max(...top.map(s => s.weight)) : lift.weight;
      const reps = top.length ? Math.max(...top.map(s => s.reps)) : 0;
      lift.history = (lift.history || []).concat({ w: kg, r: reps, date: offsetDate(0), sets: logged.map(s => ({ r: s.reps || 0, fail: !!s.failed })) });
      if (top.length) lift.weight = kg;          // last working weight carries forward
      lift.overload = null;                       // the push was for this session; next one starts fresh
      lift.sets = blankSets(lift.targetSets);    // fresh rows for next session
      lifts++; totalSets += logged.length;
    });
    if (!lifts) return;
    saveLog(); render();
    // Calm, on-brand confirmation (no overlay): rows reset, the graph grew, and the
    // caption says so with a soft mint pulse.
    const cap = document.getElementById('finishCap');
    cap.textContent = 'Session saved · ' + totalSets + ' set' + (totalSets > 1 ? 's' : '') + ' now on your graph';
    cap.classList.remove('saved'); void cap.offsetWidth; cap.classList.add('saved');
  }
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.onclick = finishSession;
  // reflect how much is ready to save (called from render)
  function paintFinish(){
    let logged = 0;
    LIFTS.filter(l => !l.hidden).forEach(l => l.sets.forEach(s => { if (s.done || s.failed) logged++; }));
    finishBtn.disabled = logged === 0;
    const cap = document.getElementById('finishCap');
    cap.classList.remove('saved');
    cap.textContent = logged
      ? 'Saves ' + logged + ' logged set' + (logged > 1 ? 's' : '') + ' as today’s session'
      : 'Log a set to finish your session';
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ── add-lift controls ──
  const addBtn = document.getElementById('addBtn');
  const addForm = document.getElementById('addForm');
  const addInput = document.getElementById('addInput');
  addBtn.onclick = () => { addForm.classList.toggle('on'); if (addForm.classList.contains('on')) addInput.focus(); };
  addForm.onsubmit = e => { e.preventDefault(); quickAddLift(addInput.value); addInput.value=''; addForm.classList.remove('on'); };

  // ── snowy particles drifting behind everything ──
  (function snow(){
    const cv = document.getElementById('snow'); if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, parts;
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const mk = () => ({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.4, s:Math.random()*0.35+0.08, d:Math.random()*0.3-0.15, o:Math.random()*0.4+0.12 });
    function size(){ W=cv.width=innerWidth; H=cv.height=innerHeight; parts=Array.from({length: reduce?26:54}, mk); }
    function frame(){
      ctx.clearRect(0,0,W,H);
      for (const p of parts){
        p.y += p.s; p.x += p.d;
        if (p.y > H+2){ p.y = -2; p.x = Math.random()*W; }
        if (p.x < -2) p.x = W; if (p.x > W+2) p.x = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.3);
        ctx.fillStyle = 'rgba(167,243,208,' + p.o + ')'; ctx.fill();
      }
      if (!reduce) requestAnimationFrame(frame);
    }
    size(); addEventListener('resize', size); frame();
  })();

  conqueredPrev = currentConquered();  // lifts already conquered from saved state shouldn't burst on load
  render();
</script>
</body>
</html>
