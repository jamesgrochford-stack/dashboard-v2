  }

  // Real sessions for one exercise from hevy_sets, grouped by workout, with
  // the metric (weight / duration / reps) auto-detected from what's actually
  // there -- duration wins when present (an isometric hold's whole point is
  // holding longer, even if it's also weighted), else weight, else reps.
  async function fetchHevyHistory(names){
    const supa = hevyClient();
    if (!supa) return { sessions: [], unit: 'kg' };
    try {
      const { data, error } = await withTimeout(
        supa.from('hevy_sets').select('weight_kg,reps,duration_seconds,hevy_workouts(start_time)').in('exercise_title', names),
        6000,
        { data: null, error: 'timed out' }
      );
      if (error || !data || !data.length) return { sessions: [], unit: 'kg' };
      const unit = data.some(r => r.duration_seconds != null) ? 's'
        : data.some(r => r.weight_kg != null) ? 'kg' : 'reps';
      const bySession = new Map();
      data.forEach(row => {
        const st = row.hevy_workouts && row.hevy_workouts.start_time;
        if (!st) return;
        if (!bySession.has(st)) bySession.set(st, []);
        bySession.get(st).push({ weight: row.weight_kg, reps: row.reps, duration: row.duration_seconds });
      });
      const sessions = [...bySession.entries()]
        .map(([start_time, sets]) => buildSessionRecord(new Date(start_time), sets, unit))
        .sort((a, b) => a.date - b.date);
      return { sessions, unit };
    } catch(e){ return { sessions: [], unit: 'kg' }; }
  }

  // Real history + today's provisional in-progress sets, merged into one
  // chartable list. Skips appending today if a real session dated today is
  // already fetched (avoids an obvious duplicate point once synced).
  async function liftSessions(lift){
    const real = await fetchHevyHistory(hevyNamesFor(lift));
    const sessions = real.sessions.slice();
    let unit = real.unit;
    const logged = lift.sets.filter(s => s.done || s.failed);
    if (logged.length){
      const todayYmd = offsetDate(0);
      const alreadyToday = sessions.length && ymdKey(sessions[sessions.length - 1].date) === todayYmd;
      if (!alreadyToday){
        if (!sessions.length) unit = isIsometricLift(lift) ? 's' : 'kg';
        const isometric = isIsometricLift(lift);
        const todaySets = logged.map(s => ({
          weight: s.weight,
          reps: isometric ? null : s.reps,
          duration: isometric ? s.reps : null,
        }));
        sessions.push(buildSessionRecord(new Date(), todaySets, unit));
      }
    }
    return { sessions, unit };
  }

  // Client-side only -- the full session list is already fetched once; the
  // range tabs just narrow what's rendered, no extra network round-trip.
  function filterByRange(sessions, range){
    if (range === 'ALL') return sessions;
    const days = { W: 7, M: 30, '3M': 90, '6M': 180, Y: 365 }[range];
    const cutoff = Date.now() - days * 86400000;
    return sessions.filter(s => s.date.getTime() >= cutoff);
  }
  function buildRangeTabs(active){
    return '<div class="rangeTabs">' + ['W','M','3M','6M','Y','ALL'].map(r =>
      '<button type="button" class="rangeTab' + (r === active ? ' active' : '') + '" data-range="' + r + '">' + r + '</button>'
    ).join('') + '</div>';
  }

  function buildHistoryStats(sessions, unit){
    if (!sessions.length) return '';
    const best = Math.max(...sessions.map(s => s.val));
    const latestStr = sessions[sessions.length - 1].date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return '<div class="sheet-stats">' +
      '<div class="sheet-stat"><div class="k">Sessions</div><div class="v">' + sessions.length + '</div></div>' +
      '<div class="sheet-stat"><div class="k">Best</div><div class="v gold">' + fmtMetric(best, unit) + '</div></div>' +
      '<div class="sheet-stat"><div class="k">Latest</div><div class="v">' + esc(latestStr) + '</div></div>' +
    '</div>';
  }

  // The most recent session's individual sets as small pills (e.g. 8 8 8),
  // plus a total -- reps summed for weight/reps-primary lifts, seconds
  // summed for isometric holds.
  function buildLatestPills(sessions, unit){
    if (!sessions.length) return '';
    const latest = sessions[sessions.length - 1];
    if (!latest.sets || !latest.sets.length) return '';
    const vals = latest.sets.map(s => unit === 's' ? s.duration : s.reps).filter(v => v != null);
    if (!vals.length) return '';
    const pills = vals.map(v => '<span class="setPill">' + Math.round(v) + '</span>').join('');
    const total = vals.reduce((a, b) => a + b, 0);
    const totalLabel = unit === 's' ? total + 's total' : total + ' reps';
    const dateStr = latest.date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return '<div class="latestSets"><span class="latestDate">' + esc(dateStr) + '</span>' + pills +
      '<span class="latestTotal">' + esc(totalLabel) + '</span></div>';
  }

  // Date / Sets / Reps / Weight / Progress, most recent first, a star on
  // the all-time (within the current range) best entry. Progress is the
  // delta vs the immediately preceding session in the chart's own metric.
  function buildHistoryTable(sessions, unit){
    if (!sessions.length) return '';
    const bestVal = Math.max(...sessions.map(s => s.val));
    const reversed = sessions.slice().reverse();
    const rows = reversed.map((s, i) => {
      const prev = reversed[i + 1];
      const progress = prev ? fmtDelta(s.val - prev.val, unit) : '—';
      const isBest = s.val === bestVal;
      const dateStr = s.date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const weightStr = s.weightVal != null ? fmtN(s.weightVal) + ' kg' : '—';
      const repsStr = s.repsVal != null ? s.repsVal : (s.durationVal != null ? s.durationVal + 's' : '—');
      return '<tr' + (isBest ? ' class="best"' : '') + '>' +
        '<td>' + esc(dateStr) + '</td>' +
        '<td>' + (s.sets ? s.sets.length : '—') + '</td>' +
        '<td>' + esc(String(repsStr)) + '</td>' +
        '<td>' + (isBest ? '★ ' : '') + esc(weightStr) + '</td>' +
        '<td>' + esc(progress) + '</td>' +
      '</tr>';
    }).join('');
    return '<table class="historyTable"><thead><tr><th>Date</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Progress</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }

  // history opens an inline chart in the same sheet modal everything else
  // uses — no second file to keep in sync, this stays one file as promised.
  function buildChartSVG(sessions, unit){
    if (!sessions.length) return '<div class="ov-empty">No sessions logged yet — finish a session to start the graph.</div>';
    const W = 400, H = 140, pad = 12;
    const vals = sessions.map(s => s.val);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const stepX = sessions.length > 1 ? (W - 2*pad) / (sessions.length - 1) : 0;
    const pts = sessions.map((s, i) => ({
      x: pad + i * stepX,
      y: H - pad - ((s.val - min) / range) * (H - 2*pad),
      best: s.val === max
    }));
    const line = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    const area = line + ' L' + pts[pts.length-1].x.toFixed(1) + ',' + (H-pad) + ' L' + pts[0].x.toFixed(1) + ',' + (H-pad) + ' Z';
    const dots = pts.map(p => '<circle class="ch-dot' + (p.best ? ' best' : '') + '" cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="3.2"></circle>').join('');
    const delta = sessions[sessions.length-1].val - sessions[0].val;
    const deltaStr = (delta >= 0 ? '+' : '-') + fmtMetric(Math.abs(delta), unit);
    const cap = sessions.length > 1
      ? '<div class="ch-cap">' + deltaStr + ' since first logged session</div>'
      : '<div class="ch-cap">First session logged — the graph grows from here.</div>';
    return '<div class="chart"><svg viewBox="0 0 ' + W + ' ' + H + '"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.4"/><stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/></linearGradient></defs>' +
      '<line class="ch-grid" x1="0" y1="' + (H-pad) + '" x2="' + W + '" y2="' + (H-pad) + '"/>' +
      '<path class="ch-area" d="' + area + '"/><path class="ch-line" d="' + line + '"/>' + dots + '</svg></div>' + cap;
  }

  // "+ log a session": a past session missing from Hevy history, entered by
  // hand for just this one exercise. Creates its own standalone
  // hevy_workouts row (not attached to any real logged day) + up to 3
  // hevy_sets rows, flagged is_backfilled with a note -- same fields the
  // Hevy-import corrections already used for this exact "known-missing,
  // added from memory" situation.
  function buildLogSessionForm(lift){
    const isometric = isIsometricLift(lift);
    const rows = [0, 1, 2].map(i =>
      '<div class="logSetRow"><span class="logSetIdx">' + (i+1) + '</span>' +
      '<input class="logInput" type="text" inputmode="decimal" placeholder="weight kg" data-k="weight" data-i="' + i + '">' +
      '<input class="logInput" type="text" inputmode="numeric" placeholder="' + (isometric ? 'seconds held' : 'reps') + '" data-k="' + (isometric ? 'duration' : 'reps') + '" data-i="' + i + '"></div>'
    ).join('');
    return '<div class="logSessionForm">' +
      '<label class="logDateLabel">Date<input class="logDateInput" id="logDate" type="date" value="' + offsetDate(0) + '"></label>' +
      rows +
      '<div class="card-foot"><button class="btn-ghost" data-act="logCancel">cancel</button><button class="btn-mint" data-act="logSubmit">save session</button></div>' +
    '</div>';
  }
  async function submitLogSession(lift, onDone){
    const dateInput = sheet.querySelector('#logDate');
    const dateVal = dateInput && dateInput.value;
    if (!dateVal) return;
    const isometric = isIsometricLift(lift);
    const setsToSave = [];
    for (let i = 0; i < 3; i++){
      const wIn = sheet.querySelector('[data-k="weight"][data-i="' + i + '"]');
      const vIn = sheet.querySelector('[data-k="' + (isometric ? 'duration' : 'reps') + '"][data-i="' + i + '"]');
      const w = wIn && wIn.value.trim() ? parseFloat(wIn.value) : null;
      const v = vIn && vIn.value.trim() ? parseFloat(vIn.value) : null;
      if (w == null && v == null) continue;
      setsToSave.push({ weight: w, val: v });
    }
    if (!setsToSave.length) return;
    const supa = hevyClient();
    if (supa){
      const startTime = dateVal + 'T12:00:00';
      try {
        const { data: w, error: wErr } = await supa.from('hevy_workouts')
          .insert({ title: 'Manual entry', start_time: startTime, end_time: startTime })
          .select('id').single();
        if (!wErr && w){
          const setRows = setsToSave.map((s, i) => ({
            workout_id: w.id,
            exercise_title: exerciseTitleFor(lift, s.weight),
            set_index: i,
            set_type: 'normal',
            weight_kg: s.weight,
            reps: isometric ? null : s.val,
            duration_seconds: isometric ? s.val : null,
            is_backfilled: true,
            correction_note: 'Manually added — missing from Hevy history.',
          }));
          await supa.from('hevy_sets').insert(setRows);
        }
      } catch(e){}
    }
    onDone();
  }

  // Async: fetches real data, so the sheet opens with a loading state first
  // and repaints once resolved (same re-openSheet idiom Tune already uses on
  // every stepper tap). Guarded against a stale response landing after the
  // sheet was closed or a different lift's history was opened in the meantime.
  let overloadRequestId = 0;
  async function openOverload(lift){
    const myId = ++overloadRequestId;
    openSheet(
      '<div class="sheet-eyebrow">History</div>' +
      '<div class="sheet-title">' + esc(lift.name) + '</div>' +
      '<div class="ov-empty">Loading your real history…</div>'
    );
    let { sessions: allSessions, unit } = await liftSessions(lift);
    if (myId !== overloadRequestId || !modal.classList.contains('on')) return;
    let range = 'ALL';
    function paint(){
      const sessions = filterByRange(allSessions, range);
      openSheet(
        '<div class="sheet-eyebrow">History</div>' +
        '<div class="sheet-title">' + esc(lift.name) + '</div>' +
        '<div class="sheet-scroll" id="historyBody">' +
          buildRangeTabs(range) +
          buildChartSVG(sessions, unit) +
          buildLatestPills(sessions, unit) +
          buildHistoryStats(sessions, unit) +
          buildHistoryTable(sessions, unit) +
          '<button class="logSessionBtn" data-act="logSession" type="button">+ log a session</button>' +
        '</div>'
      );
      const scrollBody = document.getElementById('historyBody');
      if (scrollBody) scrollBody.scrollTop = 0; // always land on the chart, never wherever a previous range-tab tap left it
      sheet.querySelectorAll('.rangeTab').forEach(b => b.onclick = () => { range = b.dataset.range; paint(); });
      const logBtn = sheet.querySelector('[data-act="logSession"]');
      if (logBtn) logBtn.onclick = paintLogForm;
    }
    function paintLogForm(){
      openSheet(
        '<div class="sheet-eyebrow">Log a session</div>' +
        '<div class="sheet-title">' + esc(lift.name) + '</div>' +
        '<div class="sheet-scroll">' + buildLogSessionForm(lift) + '</div>'
      );
      sheet.querySelector('[data-act="logCancel"]').onclick = paint;
      sheet.querySelector('[data-act="logSubmit"]').onclick = async () => {
        await submitLogSession(lift, async () => {
          const fresh = await liftSessions(lift);
          allSessions = fresh.sessions;
          paint();
        });
      };
    }
    paint();
  }
  // @episode-end:real-history

  // @episode-start:overload-card
  // The ★ overload card — 1:1 with the app's OverloadModal. Tap the ★ (before any
  // set is logged) to plan today's push: "add a rep" (one tap, +1 rep) or "add
  // 2.5 kg" (a fine stepper you can free-type). Arming writes lift.overload through
  // the ONE store, which seeds the set rows. Screens: choices · step · armed · done.
  const poModal = document.getElementById('poModal');
  const poCard = document.getElementById('poCard');
  const STEP_DISP = 1.25;     // finest plate step (metric)
  const DEFAULT_DISP = 2.5;   // the smart default nudge
  let poLift = null;
  function openOverloadCard(lift){
    poLift = lift;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    poRender(isArmed ? 'armed' : 'choices', DEFAULT_DISP);
    poModal.classList.add('on');
  }
  function closeOverloadCard(){ poModal.classList.remove('on'); poLift = null; }
  function poArm(bump){ updateLift(poLift.id, { overload: bump }); render(); }
  function poClear(){ updateLift(poLift.id, { overload: null }); render(); closeOverloadCard(); }
  function poApplied(bump){ poArm(bump); poRender('done', 0, bumpLabel(bump)); setTimeout(closeOverloadCard, 1150); }
  function poRender(view, weightDisp, doneLabel){
    const lift = poLift; if (!lift) return;
    const b = lift.overload;
    const isArmed = !!b && ((b.weightKg || 0) > 0 || (b.reps || 0) > 0);
    // "last session" readout — prior session if there is one, else the saved targets
    const last = (lift.history || [])[(lift.history || []).length - 1] || null;
    const lastSets = last && last.sets ? last.sets.length : lift.targetSets;
    const lastReps = last ? (last.r || lift.targetReps) : lift.targetReps;
    const lastWeight = last ? last.w : lift.weight;
    const head =
      '<div class="po-head"><div class="po-head-l">' +
        '<span class="po-head-ico" aria-hidden>' + SVG(GLYPH[lift.muscle] || GLYPH.chest) + '</span>' +
        '<div><div class="po-eyebrow">overload</div><div class="po-title">' + esc(lift.name) + '</div></div>' +
      '</div><button class="po-close" data-act="close" aria-label="Close"><svg viewBox="0 0 14 14"><path d="M3.5 3.5 L10.5 10.5 M10.5 3.5 L3.5 10.5"/></svg></button></div>';
    let body;
    if (view === 'done'){
      body = '<div class="po-body"><div class="po-done"><div class="po-doneAmt">' + esc(doneLabel || '') + '</div><div class="po-doneSub">on your sets for today</div></div></div>';
    } else if (view === 'armed'){
      body =
        '<div class="po-body po-armedBody">' +
          '<div class="po-star armed" aria-hidden>&#9733;</div>' +
          '<div class="po-armedAmt">' + esc(b ? bumpLabel(b) : '') + '</div>' +
          '<div class="po-armedLbl">locked onto this lift</div>' +
          '<div class="po-choices"><button class="po-choice" data-act="edit">edit</button><button class="po-choice" data-act="clear">clear it</button></div>' +
          '<button class="po-skip" data-act="close">done</button>' +
        '</div>';
    } else if (view === 'step'){
      body =
        '<div class="po-body po-stepBody"><div class="po-stepGroup"><span class="po-stepLbl">add weight</span>' +
          '<div class="po-step"><button class="po-adj" data-act="minus" aria-label="Less weight">&minus;</button>' +
            '<span class="po-val"><span class="po-plus">+</span><input class="po-input" id="poInput" inputmode="decimal" value="' + fmtN(weightDisp) + '" aria-label="Added weight"><span class="po-unit">kg</span></span>' +
            '<button class="po-adj" data-act="plus" aria-label="More weight">+</button></div></div>' +
          '<button class="po-confirm" data-act="confirm">add it</button>' +
          '<button class="po-skip" data-act="back">back</button></div>';
    } else { // choices
      body =
        '<div class="po-body"><div class="po-star" aria-hidden>&#9733;</div>' +
          '<div class="po-show"><span class="po-showD">last session</span><span class="po-showV">' +
            '<span class="po-stat"><b>' + lastSets + '</b> sets</span>' +
            '<span class="po-stat"><b>' + lastReps + '</b> reps</span>' +
            '<span class="po-stat"><b>' + fmtN(lastWeight) + '</b> kg</span></span></div>' +
          '<p class="po-hint">How much do you want to push today?</p>' +
          '<div class="po-choices"><button class="po-choice" data-act="addrep">add a rep</button><button class="po-choice" data-act="addweight">add ' + DEFAULT_DISP + ' kg</button></div>' +
          (isArmed ? '<button class="po-remove" data-act="clear">clear it</button>' : '') +
          '<button class="po-skip" data-act="close">not right now</button></div>';
    }
    poCard.innerHTML = head + body;
    const seed = (b && b.weightKg > 0) ? b.weightKg : DEFAULT_DISP;
    poCard.querySelectorAll('[data-act]').forEach(node => {
      const act = node.dataset.act;
      node.onclick = () => {
        if (act === 'close') closeOverloadCard();
        else if (act === 'clear') poClear();
        else if (act === 'addrep') poApplied({ weightKg: 0, reps: 1 });
        else if (act === 'addweight' || act === 'edit') poRender('step', seed);
        else if (act === 'back') poRender('choices', DEFAULT_DISP);
        else if (act === 'minus' || act === 'plus'){
          const inp = poCard.querySelector('#poInput');
          let v = parseFloat(inp.value); if (!isFinite(v)) v = 0;
          inp.value = fmtN(Math.max(0, Math.round((v + (act === 'plus' ? 1 : -1) * STEP_DISP) * 100) / 100));
        } else if (act === 'confirm') confirmStep();
      };
    });
    const inp = poCard.querySelector('#poInput');
    function confirmStep(){
      const v = parseFloat(poCard.querySelector('#poInput').value);
      if (!isFinite(v) || v <= 0) return;
      poApplied({ weightKg: Math.round(v * 100) / 100, reps: 0 });
    }
    if (inp) inp.onkeydown = e => { if (e.key === 'Enter'){ e.preventDefault(); confirmStep(); } };
  }
  poModal.addEventListener('click', e => { if (e.target === poModal) closeOverloadCard(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && poModal.classList.contains('on')) closeOverloadCard(); });
  // @episode-end:overload-card

  // @episode-start:overload-celebrate
  // The progressive-overload payoff, ported 1:1 from the app. A lift is CONQUERED
  // when every set is logged AND at least one done set beats the PREVIOUS best
  // (history only, never today's own sets) — so the payoff lands on the final set,
  // not the first. Crossing into conquered flushes the card gold once (the ★ bursts,
  // the numbers + name glow), then a small steady gold ★ settles beside the name.
  // Fully reversible: unlog below the overload and the mark clears. No overlay.
  function prevBestOf(lift){
    let best = null;
    (lift.history || []).forEach(s => {
      const w = s.w || 0, r = s.r || 0;
      if (!best || w > best.weight || (w === best.weight && r > best.reps)) best = { weight: w, reps: r };
    });
    return best;
  }
  function beatsPrevBest(lift, set){
    const best = prevBestOf(lift);
    if (!best || best.weight <= 0) return false;
    if (set.weight > best.weight) return true;
    return set.weight === best.weight && set.reps > best.reps;
  }
  function isConquered(lift){
    const rows = lift.sets || [];
    if (!rows.length) return false;
    if (!rows.every(s => s.done || s.failed)) return false;
    return rows.some(s => s.done && !s.failed && s.weight > 0 && s.reps > 0 && beatsPrevBest(lift, s));
  }
  // The armed overload's goal is met once a logged set hits base+bump on both axes.
  function overloadGoalMet(lift){
    const b = lift.overload; if (!b) return false;
    const tW = lift.weight + (b.weightKg || 0);
    const tR = lift.targetReps + (b.reps || 0);
    return lift.sets.some(s => s.done && !s.failed && s.weight >= tW && s.reps >= tR);
  }
  // "+2.5 kg", "+1 rep", or "+2.5 kg · +2 reps"
  function bumpLabel(b){
    const parts = [];
    if ((b.weightKg || 0) > 0) parts.push('+' + fmtN(b.weightKg) + ' kg');
    if ((b.reps || 0) > 0) parts.push('+' + b.reps + ' rep' + (b.reps > 1 ? 's' : ''));
    return parts.join(' · ') || 'no change';
  }

  // Fire the one-time gold burst on the TRANSITION into conquered. render() rebuilds
  // the list each time, so liftCard re-applies the class to lifts still mid-burst;
  // this only STARTS the burst (+ a 1.6s timer) for lifts newly crossing the line.
  const celebratingIds = new Set();
  let conqueredPrev = new Set();
  function currentConquered(){
    const s = new Set();
    visibleLifts().forEach(l => { if (isConquered(l)) s.add(l.id); });
    return s;
  }
  function syncCelebrations(){
    const now = currentConquered();
    now.forEach(id => {
      if (!conqueredPrev.has(id) && !celebratingIds.has(id)){
        celebratingIds.add(id);
        const card = listEl.querySelector('.lift[data-id="' + id + '"]');
        if (card) card.classList.add('celebrate');
        setTimeout(() => {
          celebratingIds.delete(id);
          const c = listEl.querySelector('.lift[data-id="' + id + '"]');
          if (c) c.classList.remove('celebrate');
        }, 1600);
      }
    });
    conqueredPrev = now;
  }
  // @episode-end:overload-celebrate

  // @episode-start:hevy-sync
  // Reconnects this logger to the SAME hevy_workouts/hevy_sets tables the
  // imported Hevy history lives in (not a separate table). vitality.logger.v3
  // + sync.js's app_state mirror keep working exactly as before, untouched --
  // that stays the offline-resilience fallback. This is a second, additive,
  // isolated write path: DOM updates instantly (unchanged), this pushes to
  // Supabase in the background, same idiom as everywhere else in the app.
  const HEVY_SUPABASE_URL = (typeof window !== 'undefined' && window.DASH_SUPABASE_URL) || 'https://dkvwlwmcdtqrxckecwjm.supabase.co';
  const HEVY_SUPABASE_KEY = (typeof window !== 'undefined' && window.DASH_SUPABASE_KEY) || 'sb_publishable_owu2zajkoUEe5AFNurQbUw_jCf0srN-';
  let hevySupa = null;
  function hevyClient(){
    if (!hevySupa && typeof window !== 'undefined' && window.supabase) hevySupa = window.supabase.createClient(HEVY_SUPABASE_URL, HEVY_SUPABASE_KEY);
    return hevySupa;
  }

  function hevySetClientId(sessionClientId, lift, i){ return sessionClientId + '-' + lift.id + '-' + i; }

  // One small, targeted exercise-name resolution -- NOT a general
  // reconciliation table (that was removed as dead code two sessions ago,
  // once every SEED name matched its real hevy_sets name directly). RDL is
  // the one exception reintroduced with the Wednesday toggle: its display
  // name doesn't literally match either real name, and James's dumbbells
  // cap at 24kg (James_Gym_Profile.md), so a logged weight above that is
  // only physically possible on a barbell.
  function exerciseTitleFor(lift, weight){
    if (lift.name === 'RDL') return (weight || 0) > 24 ? 'Single Leg Romanian Deadlift (Barbell)' : 'Single Leg Romanian Deadlift (Dumbbell)';
    return lift.name;
  }

  // Creates (once per session) or reuses the hevy_workouts row for today's
  // in-progress session, keyed by a locally-generated client_id so repeated
  // background pushes upsert the SAME row instead of duplicating it.
  async function ensureSessionRow(){
    let s = loadSession();
    if (s && s.workoutId) return s;
    const supa = hevyClient(); if (!supa) return null;
    if (!s){
      s = { clientId: 'gym-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8), day: currentDay, startAt: new Date().toISOString(), workoutId: null };
      saveSession(s);
      startSessionClock(s.startAt);
    }
    try {
      const { data, error } = await supa.from('hevy_workouts')
        .upsert({ client_id: s.clientId, title: s.day === 'sun' ? 'Sunday' : 'Wednesday', start_time: s.startAt, end_time: null }, { onConflict: 'client_id' })
        .select('id').single();
      if (!error && data){ s.workoutId = data.id; saveSession(s); }
    } catch(e){}
    return s;
  }

  function scheduleHevySync(){ clearTimeout(hevySyncTimer); hevySyncTimer = setTimeout(pushHevySync, 250); }

  async function pushHevySync(){
    const anyLogged = LIFTS.some(l => l.sets.some(x => x.done || x.failed));
    if (!anyLogged) return;
    const session = await ensureSessionRow();
    if (!session || !session.workoutId) return;
    const rows = [];
    visibleLifts().forEach(lift => {
      const isometric = isIsometricLift(lift);
      lift.sets.forEach((set, i) => {
        if (!set.done && !set.failed) return;
        const loggedVal = set.failed ? null : set.reps;
        rows.push({
          client_id: hevySetClientId(session.clientId, lift, i),
          workout_id: session.workoutId,
          exercise_title: exerciseTitleFor(lift, set.weight),
          set_index: i,
          set_type: 'normal',
          weight_kg: set.weight,
          reps: isometric ? null : loggedVal,
          duration_seconds: isometric ? loggedVal : null,
          is_backfilled: false,
        });
      });
    });
    if (!rows.length) return;
    const supa = hevyClient(); if (!supa) return;
    try { await supa.from('hevy_sets').upsert(rows, { onConflict: 'client_id' }); } catch(e){}
  }

  // Resetting a logged set (the pillReset button) needs to remove its
  // already-pushed hevy_sets row too, not just wait for the next debounced
  // push -- pushHevySync only ever sends CURRENTLY-logged sets, so a reset
  // set would otherwise leave a stale row behind forever.
  async function deleteHevySet(lift, i){
    const s = loadSession(); if (!s) return;
    const supa = hevyClient(); if (!supa) return;
    try { await supa.from('hevy_sets').delete().eq('client_id', hevySetClientId(s.clientId, lift, i)); } catch(e){}
  }

  // Finish session: stamp end_time on the same row and clear the local
  // pointer so the next logged set starts a brand-new session/row. A session
  // left open overnight (browser closed mid-workout, never Finished) is left
  // as end_time = null in Supabase -- harmless, and a fresh session starts
  // regardless the next time a set is logged.
  async function finalizeHevySession(){
    const s = loadSession();
    if (!s || !s.workoutId){ clearSession(); stopSessionClock(); return; }
    const supa = hevyClient();
    if (supa){ try { await supa.from('hevy_workouts').update({ end_time: new Date().toISOString() }).eq('id', s.workoutId); } catch(e){} }
    clearSession();
    stopSessionClock();
  }

  // Abort an in-progress session: a real, permanent delete, not a "finish
  // with nothing logged." hevy_sets.workout_id has no ON DELETE CASCADE
  // (checked the original schema -- it's plain NO ACTION), so sets must be
  // deleted BEFORE the workout row or Postgres rejects the workout delete
  // with a foreign-key violation. Also resets the local cards so aborting
  // really means "this session never happened," not just "stop tracking it."
  async function cancelSession(){
    const s = loadSession();
    if (!s) return;
    clearTimeout(hevySyncTimer); // a queued push must not recreate rows we're about to delete
    const supa = hevyClient();
    if (supa && s.workoutId){
      try {
        await supa.from('hevy_sets').delete().eq('workout_id', s.workoutId);
        await supa.from('hevy_workouts').delete().eq('id', s.workoutId);
      } catch(e){}
    }
    clearSession();
    stopSessionClock();
    stopRestTimer();
    LIFTS.forEach(lift => { lift.sets = blankSets(lift.targetSets); });
    saveLog(); render();
  }

  function confirmCancelSession(){
    if (!loadSession()) return;
    openSheet(
      '<div class="sheet-eyebrow">Cancel session</div>' +
      '<div class="sheet-title">Abort this session?</div>' +
      '<div class="sheet-sub">This deletes everything logged in this session from Supabase and clears it on this device. It can’t be undone.</div>' +
      '<div class="card-foot"><button class="btn-ghost" data-act="back">never mind</button><button class="btn-mint btn-danger" data-act="confirm">Yes, delete it</button></div>'
    );
    sheet.querySelector('[data-act="back"]').onclick = closeSheet;
    sheet.querySelector('[data-act="confirm"]').onclick = () => { closeSheet(); cancelSession(); };
  }
  // @episode-end:hevy-sync

  // @episode-start:timers
  // Session elapsed clock: starts on the first logged set, ticks every
  // second, and survives a reload (the START TIMESTAMP is what's persisted,
  // not a running count) so closing the tab mid-workout and coming back
  // doesn't reset it to zero.
  let sessionClockTimer = null;
  function fmtElapsed(ms){
    const total = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(total / 3600), m = Math.floor((total % 3600) / 60), s = total % 60;
    return (h > 0 ? h + ':' + pad2(m) : String(m)) + ':' + pad2(s);
  }
  function startSessionClock(startAt){
    stopSessionClock();
    const el = document.getElementById('sessionClock');
    const tick = () => { if (el){ el.textContent = fmtElapsed(Date.now() - Date.parse(startAt)); el.classList.add('live'); } };
    tick();
    sessionClockTimer = setInterval(tick, 1000);
    const cancelLink = document.getElementById('cancelSessionLink');
    if (cancelLink) cancelLink.classList.add('on');
  }
  function stopSessionClock(){
    clearInterval(sessionClockTimer); sessionClockTimer = null;
    const el = document.getElementById('sessionClock');
    if (el){ el.textContent = ''; el.classList.remove('live'); }
    const cancelLink = document.getElementById('cancelSessionLink');
    if (cancelLink) cancelLink.classList.remove('on');
  }

  // Rest timer: one global countdown (not per-lift -- this program has no
  // supersets, and Hevy itself only ever runs one at a time), (re)started by
  // every hit/miss tap, duration from that lift's own `rest` field (already
  // existed, was purely decorative until now). Deliberately NOT persisted --
  // a reload just drops it, unlike the session clock above which is real data.
  let restTimer = null, restDeadline = 0;
  function restTick(){
    const bar = document.getElementById('restBar');
    const timeEl = document.getElementById('restTime');
    const left = Math.round((restDeadline - Date.now()) / 1000);
    if (left <= 0){ stopRestTimer(); return; }
    if (timeEl) timeEl.textContent = Math.floor(left/60) + ':' + pad2(left%60);
  }
  function startRestTimer(seconds, liftName){
    clearInterval(restTimer);
    restDeadline = Date.now() + Math.max(1, seconds) * 1000;
    const bar = document.getElementById('restBar');
    const label = document.getElementById('restLiftLabel');
    if (label) label.textContent = liftName || 'Rest';
    if (bar) bar.classList.add('on');
    restTick();
    restTimer = setInterval(restTick, 250);
  }
  function stopRestTimer(){
    clearInterval(restTimer); restTimer = null;
    const bar = document.getElementById('restBar'); if (bar) bar.classList.remove('on');
  }
  // Live -15/+15: only meaningful while a timer is actually counting down;
  // an immediate restTick() updates the number without waiting up to 250ms
  // for the next interval tick.
  function adjustRestTimer(deltaSeconds){
    if (!restTimer) return;
    restDeadline += deltaSeconds * 1000;
    restTick();
  }
  const restSkipBtn = document.getElementById('restSkip');
  if (restSkipBtn) restSkipBtn.onclick = stopRestTimer;
  const restMinusBtn = document.getElementById('restMinus');
  if (restMinusBtn) restMinusBtn.onclick = () => adjustRestTimer(-15);
  const restPlusBtn = document.getElementById('restPlus');
  if (restPlusBtn) restPlusBtn.onclick = () => adjustRestTimer(15);
  const cancelSessionBtn = document.getElementById('cancelSessionLink');
  if (cancelSessionBtn) cancelSessionBtn.onclick = confirmCancelSession;
  // @episode-end:timers

  // ── finish session: today's logged sets become a saved session, the graph
  //    grows, and the rows reset for next time. This is the loop made whole. ──
  async function finishSession(){
    const hasLogged = visibleLifts().some(lift => lift.sets.some(s => s.done || s.failed));
    if (!hasLogged) return;
    clearTimeout(hevySyncTimer);
    await pushHevySync();  // flush this session's final sets before we blank them below
    let lifts = 0, totalSets = 0;
    visibleLifts().forEach(lift => {
      const logged = lift.sets.filter(s => s.done || s.failed);
      if (!logged.length) return;
      const top = lift.sets.filter(s => s.done && !s.failed);
      const kg = top.length ? Math.max(...top.map(s => s.weight)) : lift.weight;
      const reps = top.length ? Math.max(...top.map(s => s.reps)) : 0;
      lift.history = (lift.history || []).concat({ w: kg, r: reps, date: offsetDate(0), sets: logged.map(s => ({ r: s.reps || 0, fail: !!s.failed })) });
      if (top.length) lift.weight = kg;          // last working weight carries forward
      lift.overload = null;                       // the push was for this session; next one starts fresh
      lift.sets = blankSets(lift.targetSets);    // fresh rows for next session
      lifts++; totalSets += logged.length;
    });
    if (!lifts) return;
    saveLog(); render();
    // Calm, on-brand confirmation (no overlay): rows reset, the graph grew, and the
    // caption says so with a soft mint pulse.
    const cap = document.getElementById('finishCap');
    cap.textContent = 'Session saved · ' + totalSets + ' set' + (totalSets > 1 ? 's' : '') + ' now on your graph';
    cap.classList.remove('saved'); void cap.offsetWidth; cap.classList.add('saved');
    await finalizeHevySession();
    stopRestTimer();
  }
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.onclick = finishSession;
  // reflect how much is ready to save (called from render)
  function paintFinish(){
    let logged = 0;
    LIFTS.filter(l => !l.hidden).forEach(l => l.sets.forEach(s => { if (s.done || s.failed) logged++; }));
    finishBtn.disabled = logged === 0;
    const cap = document.getElementById('finishCap');
    cap.classList.remove('saved');
    cap.textContent = logged
      ? 'Saves ' + logged + ' logged set' + (logged > 1 ? 's' : '') + ' as today’s session'
      : 'Log a set to finish your session';
  }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ── add-lift controls ──
  const addBtn = document.getElementById('addBtn');
  const addForm = document.getElementById('addForm');
  const addInput = document.getElementById('addInput');
  addBtn.onclick = () => { addForm.classList.toggle('on'); if (addForm.classList.contains('on')) addInput.focus(); };
  addForm.onsubmit = e => { e.preventDefault(); quickAddLift(addInput.value); addInput.value=''; addForm.classList.remove('on'); };

  // ── snowy particles drifting behind everything ──
  (function snow(){
    const cv = document.getElementById('snow'); if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, parts;
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const mk = () => ({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.4, s:Math.random()*0.35+0.08, d:Math.random()*0.3-0.15, o:Math.random()*0.4+0.12 });
    function size(){ W=cv.width=innerWidth; H=cv.height=innerHeight; parts=Array.from({length: reduce?26:54}, mk); }
    function frame(){
      ctx.clearRect(0,0,W,H);
      for (const p of parts){
        p.y += p.s; p.x += p.d;
        if (p.y > H+2){ p.y = -2; p.x = Math.random()*W; }
        if (p.x < -2) p.x = W; if (p.x > W+2) p.x = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.3);
        ctx.fillStyle = 'rgba(167,243,208,' + p.o + ')'; ctx.fill();
      }
      if (!reduce) requestAnimationFrame(frame);
    }
    size(); addEventListener('resize', size); frame();
  })();

  conqueredPrev = currentConquered();  // lifts already conquered from saved state shouldn't burst on load
  render();

  // Resume the elapsed clock if a session was already in progress when this
  // page loaded (e.g. the tab was closed mid-workout and reopened).
  (function resumeSession(){
    const s = loadSession();
    if (s && s.startAt) startSessionClock(s.startAt);
  })();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'gymLogger',
    syncedKeys: ['vitality.logger.v3'],
    onApplied: function () {
      // Remote (phone/laptop) pushed new sets — reload LIFTS from the
      // now-updated localStorage and redraw, without re-bursting the
      // gold "conquered" celebration for lifts that were already done.
      if (typeof loadLog === 'function') loadLog();
      if (typeof currentConquered === 'function') conqueredPrev = currentConquered();
      if (typeof render === 'function') render();
    }
  });
});
</script>
</body>
